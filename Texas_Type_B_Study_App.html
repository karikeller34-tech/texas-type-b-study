termines extinguisher selection.", "D": "Occupancy classification applies only to the entire building."}, "correctAnswer": "B", "explanation": "NFPA 10 requires extinguisher selection to be based on the hazards present within the occupancy being protected. Different occupancies in the same building may require different protection."}, {"id": "Q091", "chapter": 5, "chapterLabel": "5", "primaryTopic": "Occupancy Classification", "subtopic": "Applying NFPA Definitions", "difficulty": "Difficult", "question": "A technician surveys a warehouse where combustible materials are limited, but manufacturing operations produce a high rate of heat release if a fire occurs.\nWhich factor described by NFPA 10 should influence the occupancy hazard classification?", "answers": {"A": "Only the age of the building.", "B": "Only the total floor area.", "C": "The expected rate of heat release in addition to the quantity of combustibles.", "D": "The insurance carrier's recommendations."}, "correctAnswer": "C", "explanation": "NFPA 10 considers not only the quantity of combustible materials but also the anticipated rate of heat release when classifying occupancy hazards."}, {"id": "Q092", "chapter": 5, "chapterLabel": "5", "primaryTopic": "Extinguisher Selection", "subtopic": "Technician Responsibility", "difficulty": "Moderate", "question": "A customer asks the technician,\n\"Can't you just install the same extinguishers you installed at my other building?\"\nWhich response best reflects NFPA 10?", "answers": {"A": "Yes. Similar businesses should always receive identical extinguisher protection.", "B": "Yes, provided the extinguishers are currently inspected.", "C": "No. Extinguisher selection should be based on the specific hazards present at each location.", "D": "No. Every building requires a unique extinguisher manufacturer."}, "correctAnswer": "C", "explanation": "NFPA 10 requires extinguisher selection to be based on the actual hazards present at the specific occupancy. Similar businesses may have different hazards, quantities of combustibles, or fire risks requiring different protection.\nI analyzed all three uploaded pages.\nChapter 6 Content Covered by These Pages\nThese pages include the beginning of Chapter 6 – Installation of Portable Fire Extinguishers, specifically:\nMinimum number of extinguishers\nAdditional extinguishers\nReadiness requirements\nPlacement requirements\nAccessibility\nNormal paths of travel\nVisual obstructions\nApproved mounting methods\nWheeled extinguisher placement\nProtection from damage\nInstallation height\nLabel visibility\nCabinets\nTemperature limitations\nAntifreeze requirements\nClass A extinguisher sizing and placement\nClass B extinguisher sizing and placement\nClass C installation\nClass D installation\nClass K installation\nThis is one of the most heavily tested portions of NFPA 10 and should generate a large number of licensing-style questions."}, {"id": "Q093", "chapter": 6, "chapterLabel": "6 – Installation of Portable Fire Extinguishers", "primaryTopic": "Number of Extinguishers", "subtopic": "Minimum Requirements", "difficulty": "Moderate", "question": "A technician is asked how many portable fire extinguishers must be installed in a newly constructed building.\nAccording to NFPA 10, what determines the minimum number required?", "answers": {"A": "The building owner's insurance requirements.", "B": "The manufacturer's recommendations.", "C": "The requirements outlined in Chapter 6.", "D": "The local fire department's preference."}, "correctAnswer": "C", "explanation": "Section 6.1.1 states that the minimum number of extinguishers required to protect a property shall be determined as outlined in Chapter 6."}, {"id": "Q094", "chapter": 6, "chapterLabel": "6", "primaryTopic": "Additional Extinguishers", "subtopic": "Extra Protection", "difficulty": "Moderate", "question": "After completing an installation that meets the minimum NFPA 10 requirements, a customer asks whether additional extinguishers may be installed for added protection.\nWhat should the technician advise?", "answers": {"A": "Additional extinguishers are prohibited.", "B": "Additional extinguishers are permitted when more protection is desired.", "C": "Additional extinguishers may be installed only with AHJ approval.", "D": "Additional extinguishers are permitted only in industrial occupancies."}, "correctAnswer": "B", "explanation": "Section 6.1.1.1 permits additional extinguishers to be installed to provide more protection as necessary."}, {"id": "Q095", "chapter": 6, "chapterLabel": "6", "primaryTopic": "Extinguisher Readiness", "subtopic": "Operable Condition", "difficulty": "Moderate", "question": "A technician finds a portable fire extinguisher stored in a maintenance room because it is \"not currently needed.\"\nAccording to NFPA 10, which statement is correct?", "answers": {"A": "Extinguishers may be stored anywhere when not needed.", "B": "Portable fire extinguishers shall be maintained fully charged, operable, and kept in their designated locations whenever they are not being used.", "C": "Extinguishers may be removed from their assigned locations during normal business hours.", "D": "Readiness requirements apply only to Class A extinguishers."}, "correctAnswer": "B", "explanation": "Section 6.1.2 requires extinguishers to remain fully charged, operable, and in their designated locations whenever they are not in use."}, {"id": "Q096", "chapter": 6, "chapterLabel": "6", "primaryTopic": "Placement", "subtopic": "Accessibility", "difficulty": "Difficult", "question": "During a final inspection, a technician notices an extinguisher mounted inside a locked storage room that employees cannot quickly access during an emergency.\nWhich NFPA 10 requirement has most likely not been met?", "answers": {"A": "The extinguisher should be conspicuously located where it is readily accessible and immediately available.", "B": "The extinguisher should always be mounted outdoors.", "C": "The extinguisher should be located beside the electrical service.", "D": "Accessibility requirements apply only to wheeled extinguishers."}, "correctAnswer": "A", "explanation": "Section 6.1.3.1 requires extinguishers to be conspicuously located where they are readily accessible and immediately available."}, {"id": "Q097", "chapter": 6, "chapterLabel": "6", "primaryTopic": "Placement", "subtopic": "Paths of Travel", "difficulty": "Moderate", "question": "While evaluating a warehouse, a technician determines the extinguisher locations require employees to leave the normal exit route to retrieve one during an emergency.\nAccording to NFPA 10, how should extinguishers generally be located?", "answers": {"A": "Near loading docks only.", "B": "Along normal paths of travel, including exits from areas.", "C": "In mechanical rooms only.", "D": "Only beside electrical panels."}, "correctAnswer": "B", "explanation": "Section 6.1.3.2 requires extinguishers to be located along normal paths of travel, including exits from areas."}, {"id": "Q098", "chapter": 6, "chapterLabel": "6", "primaryTopic": "Visual Obstructions", "subtopic": "Obstructed View", "difficulty": "Moderate", "question": "A portable fire extinguisher is completely hidden behind stacked inventory.\nWhich statement best reflects NFPA 10?", "answers": {"A": "This is acceptable if employees know its location.", "B": "Fire extinguishers shall not be obstructed or obscured from view.", "C": "Visibility requirements apply only to Class A extinguishers.", "D": "Only the operating instructions must remain visible."}, "correctAnswer": "B", "explanation": "Section 6.1.3.3.1 requires extinguishers not to be obstructed or obscured from view."}, {"id": "Q099", "chapter": 6, "chapterLabel": "6", "primaryTopic": "Visual Obstructions", "subtopic": "Large Rooms", "difficulty": "Difficult", "question": "A technician is installing extinguishers in a large manufacturing facility where structural columns prevent every extinguisher from being visible from all directions.\nAccording to NFPA 10, what additional action should be taken?", "answers": {"A": "Install more extinguishers until every unit is visible.", "B": "Provide means to indicate the extinguisher locations where visual obstructions cannot be completely avoided.", "C": "Paint every extinguisher cabinet red.", "D": "Mount extinguishers above eye level."}, "correctAnswer": "B", "explanation": "Section 6.1.3.3.2 requires means to indicate extinguisher locations when visual obstructions cannot be completely avoided."}, {"id": "Q100", "chapter": 6, "chapterLabel": "6", "primaryTopic": "Mounting Methods", "subtopic": "Approved Installation", "difficulty": "Difficult", "question": "A technician proposes securing a portable fire extinguisher to a shelf using wire because an approved mounting bracket is unavailable.\nBased on NFPA 10, what is the best response?", "answers": {"A": "This is acceptable if the extinguisher cannot fall.", "B": "Portable extinguishers shall be installed using approved methods such as a hanger, the manufacturer's bracket, a listed bracket, or a cabinet or wall recess.", "C": "Wire is acceptable only for Class B extinguishers.", "D": "Any secure mounting method is acceptable."}, "correctAnswer": "B", "explanation": "Section 6.1.3.4 lists the approved methods for mounting portable fire extinguishers."}, {"id": "Q101", "chapter": 6, "chapterLabel": "6", "primaryTopic": "Wheeled Extinguishers", "subtopic": "Designated Locations", "difficulty": "Moderate", "question": "A facility uses wheeled fire extinguishers for several special hazards.\nAccording to NFPA 10, where should these extinguishers be located?", "answers": {"A": "Wherever floor space is available.", "B": "In designated locations.", "C": "Inside locked storage rooms.", "D": "Outdoors whenever possible."}, "correctAnswer": "B", "explanation": "Section 6.1.3.5 requires wheeled fire extinguishers to be located in designated locations."}, {"id": "Q102", "chapter": 6, "chapterLabel": "6", "primaryTopic": "Physical Protection", "subtopic": "Damage Prevention", "difficulty": "Difficult", "question": "A forklift routinely travels through the aisle where a portable fire extinguisher is mounted, creating a significant risk of impact damage.\nAccording to NFPA 10, what should the technician recommend?", "answers": {"A": "Leave the extinguisher where it is because visibility is adequate.", "B": "Protect the extinguisher against physical damage caused by impact or similar hazards.", "C": "Lower the extinguisher closer to the floor.", "D": "Install a larger extinguisher instead."}, "correctAnswer": "B", "explanation": "Section 6.1.3.7 requires extinguishers subject to physical damage, such as impact or vibration, to be protected against damage.\n\nExcellent. These next questions are based on the remaining Chapter 6 material shown on pages 10-10 through 10-12, specifically installation height, label visibility, cabinets, temperature limitations, antifreeze, and the beginning of the Class A installation requirements."}, {"id": "Q103", "chapter": 6, "chapterLabel": "6 – Installation of Portable Fire Extinguishers", "primaryTopic": "Installation Height", "subtopic": "Extinguishers 40 lb or Less", "difficulty": "Moderate", "question": "A technician installs a portable fire extinguisher weighing 32 lb (14.5 kg) so that the top of the extinguisher is 5 ft 8 in (1.73 m) above the finished floor.\nBased on NFPA 10, what should the technician conclude?", "answers": {"A": "The installation complies because the extinguisher weighs less than 40 lb.", "B": "The installation does not comply because the top of the extinguisher exceeds the maximum permitted mounting height.", "C": "The installation is acceptable if the operating instructions remain visible.", "D": "Installation height is determined only by the AHJ."}, "correctAnswer": "B", "explanation": "For extinguishers having a gross weight of 40 lb (18.14 kg) or less, the top of the extinguisher shall be no more than 5 ft (1.53 m) above the floor."}, {"id": "Q104", "chapter": 6, "chapterLabel": "6", "primaryTopic": "Installation Height", "subtopic": "Extinguishers Over 40 lb", "difficulty": "Moderate", "question": "A wheeled extinguisher is excluded from the mounting-height requirements, but a 50 lb hand portable extinguisher is being wall-mounted.\nWhat is the maximum permitted height to the top of the extinguisher?", "answers": {"A": "5 ft (1.53 m)", "B": "4 ft (1.22 m)", "C": "3½ ft (1.07 m)", "D": "2½ ft (0.76 m)"}, "correctAnswer": "C", "explanation": "Portable extinguishers with a gross weight greater than 40 lb (18.14 kg) (except wheeled types) shall be installed so that the top is no more than 3½ ft (1.07 m) above the floor."}, {"id": "Q105", "chapter": 6, "chapterLabel": "6", "primaryTopic": "Installation Height", "subtopic": "Minimum Clearance", "difficulty": "Difficult", "question": "During a quality assurance inspection, a technician finds that the bottom of a wall-mounted portable fire extinguisher is only 2 inches (51 mm) above the finished floor.\nAccording to NFPA 10, what is the correct assessment?", "answers": {"A": "The installation complies because the extinguisher is easily accessible.", "B": "The installation does not comply because the minimum clearance from the floor has not been maintained.", "C": "The clearance requirement applies only to Class A extinguishers.", "D": "The installation is acceptable if the extinguisher weighs less than 40 lb."}, "correctAnswer": "B", "explanation": "NFPA 10 requires a minimum clearance of 4 inches (102 mm) between the bottom of a hand portable fire extinguisher and the floor."}, {"id": "Q106", "chapter": 6, "chapterLabel": "6", "primaryTopic": "Label Visibility", "subtopic": "Operating Instructions", "difficulty": "Moderate", "question": "A technician mounts an extinguisher with the operating instructions facing the wall because the installation looks cleaner.\nWhich statement best reflects NFPA 10?", "answers": {"A": "This is acceptable if employees receive annual training.", "B": "Operating instructions shall be located on the front of the extinguisher and be clearly visible.", "C": "Only the classification label must remain visible.", "D": "Label orientation is optional."}, "correctAnswer": "B", "explanation": "NFPA 10 requires the extinguisher's operating instructions to be on the front of the extinguisher and clearly visible."}, {"id": "Q107", "chapter": 6, "chapterLabel": "6", "primaryTopic": "Label Visibility", "subtopic": "Additional Labels", "difficulty": "Difficult", "question": "A service company places a large maintenance label across the front operating instructions of a portable fire extinguisher.\nBased on NFPA 10, what is the technician's best recommendation?", "answers": {"A": "The label is acceptable if it contains maintenance information.", "B": "Labels such as HMIS, maintenance labels, hydrostatic test labels, or other labels shall not be placed on the front of the extinguisher where they interfere with the operating instructions.", "C": "Labels may be placed anywhere if the owner approves.", "D": "Only hydrostatic test labels are prohibited."}, "correctAnswer": "B", "explanation": "NFPA 10 prohibits placing maintenance, hydrostatic, HMIS, or similar labels on the front of the extinguisher where they interfere with visibility of the operating instructions."}, {"id": "Q108", "chapter": 6, "chapterLabel": "6", "primaryTopic": "Cabinets", "subtopic": "Locked Cabinets", "difficulty": "Moderate", "question": "A property owner wants all extinguisher cabinets locked to prevent theft.\nAccording to NFPA 10, what is the best response?", "answers": {"A": "Cabinets shall always remain locked.", "B": "Cabinets generally shall not be locked unless the extinguishers are subject to malicious use and emergency access is provided.", "C": "Cabinets may be locked only after business hours.", "D": "Cabinets must always use keyed locks."}, "correctAnswer": "B", "explanation": "Cabinets housing fire extinguishers shall not be locked, except where extinguishers are subject to malicious use and the cabinets include a means of emergency access."}, {"id": "Q109", "chapter": 6, "chapterLabel": "6", "primaryTopic": "Cabinets", "subtopic": "Cabinet Installation", "difficulty": "Difficult", "question": "A technician installs a fire extinguisher inside a recessed cabinet with the operating instructions facing the back of the cabinet.\nAccording to NFPA 10, what correction should be made?", "answers": {"A": "The extinguisher should be mounted horizontally.", "B": "The operating instructions shall face outward.", "C": "Cabinet-mounted extinguishers must always be removed from the cabinet.", "D": "The orientation is optional."}, "correctAnswer": "B", "explanation": "Fire extinguishers mounted in cabinets or wall recesses shall be installed so the operating instructions face outward."}, {"id": "Q110", "chapter": 6, "chapterLabel": "6", "primaryTopic": "Temperature Protection", "subtopic": "Listed Temperature Range", "difficulty": "Moderate", "question": "A technician plans to install a portable fire extinguisher outdoors where temperatures routinely exceed the maximum temperature shown on the extinguisher label.\nAccording to NFPA 10, what should the technician do?", "answers": {"A": "Install the extinguisher because it is weather resistant.", "B": "Install the extinguisher only during winter months.", "C": "Do not expose the extinguisher to temperatures outside its listed temperature range.", "D": "Replace the pressure gauge annually."}, "correctAnswer": "C", "explanation": "Portable fire extinguishers shall not be exposed to temperatures outside the listed temperature range shown on the extinguisher label."}, {"id": "Q111", "chapter": 6, "chapterLabel": "6", "primaryTopic": "Antifreeze", "subtopic": "Water-Type Extinguishers", "difficulty": "Difficult", "question": "A plain-water fire extinguisher will be installed in an unheated building where temperatures may reach –20°F (–29°C) during the winter.\nAccording to NFPA 10, which action is permitted?", "answers": {"A": "Replace the water with calcium chloride solution.", "B": "Protect the extinguisher by adding an antifreeze specified on the extinguisher nameplate.", "C": "Drain the extinguisher during the winter.", "D": "Store the extinguisher horizontally."}, "correctAnswer": "B", "explanation": "Plain-water extinguishers may be protected to temperatures as low as –40°F (–40°C) by adding an antifreeze specifically identified on the extinguisher nameplate."}, {"id": "Q112", "chapter": 6, "chapterLabel": "6", "primaryTopic": "Antifreeze", "subtopic": "Calcium Chloride Restriction", "difficulty": "Difficult", "question": "While servicing a stainless steel water extinguisher, a trainee suggests using a calcium chloride solution as the antifreeze.\nWhat should the supervising technician advise?", "answers": {"A": "Calcium chloride is the preferred antifreeze for stainless steel extinguishers.", "B": "Calcium chloride may be used only in Class A occupancies.", "C": "Calcium chloride solutions shall not be used in stainless steel extinguishers.", "D": "The choice of antifreeze is left entirely to the service company."}, "correctAnswer": "C", "explanation": "NFPA 10 specifically prohibits the use of calcium chloride solutions in stainless steel fire extinguishers.\n\nI analyzed the uploaded pages.\nThese pages contain the beginning of Chapter 7 (Inspection, Maintenance, and Recharging) through the beginning of Chapter 8. They include:\nResponsibilities\nPersonnel qualifications\nReplacement extinguishers while servicing\nTags and labels\nElectronic monitoring systems\nInspection frequency\nMonthly inspection procedures\nConditions requiring more frequent inspections\nCorrective actions\nInspection recordkeeping\nMaintenance frequency\nSix-year maintenance\nInternal examination intervals\nCarbon dioxide hose testing\nPressure regulators\nMaintenance procedures\nMaintenance labels\nVerification-of-service collars\nRecharging\nRecharge agents\nDry chemical reuse\nHalogenated agents\nPressurization requirements\nRecharge recordkeeping\nThis chapter is extremely important for the Texas Type B exam and will probably produce 50–60 questions by itself. Below is the first set."}, {"id": "Q113", "chapter": 7, "chapterLabel": "7 – Inspection, Maintenance, and Recharging", "primaryTopic": "Responsibility", "subtopic": "Owner Responsibility", "difficulty": "Moderate", "question": "A technician completes the installation of portable fire extinguishers in a commercial building. The building owner asks who is responsible for future inspections, maintenance, and recharging.\nAccording to NFPA 10, who has this responsibility?", "answers": {"A": "The extinguisher manufacturer.", "B": "The installing contractor.", "C": "The owner or the owner's designated agent or occupant of the property.", "D": "The local fire department."}, "correctAnswer": "C", "explanation": "Section 7.1.1 assigns responsibility for inspection, maintenance, and recharging to the owner or the owner's designated agent or occupant."}, {"id": "Q114", "chapter": 7, "chapterLabel": "7", "primaryTopic": "Personnel", "subtopic": "Certification", "difficulty": "Moderate", "question": "A new employee asks whether anyone may perform maintenance and recharging on portable fire extinguishers.\nWhich response best follows NFPA 10?", "answers": {"A": "Any employee may perform maintenance after receiving on-the-job training.", "B": "Persons performing maintenance and recharging shall be certified.", "C": "Certification is required only for hydrostatic testing.", "D": "Certification is required only for wheeled extinguishers."}, "correctAnswer": "B", "explanation": "Section 7.1.2.1 requires persons performing maintenance and recharging to be certified."}, {"id": "Q115", "chapter": 7, "chapterLabel": "7", "primaryTopic": "Personnel", "subtopic": "Trainees", "difficulty": "Difficult", "question": "A trainee is participating in extinguisher maintenance as part of a certification program.\nUnder what conditions may the trainee perform maintenance?", "answers": {"A": "Independently after passing a written examination.", "B": "Only under the direct supervision and immediate presence of a certified person.", "C": "Only after completing six months of employment.", "D": "Only on nonrechargeable extinguishers."}, "correctAnswer": "B", "explanation": "Persons training to become certified may perform maintenance only under the direct supervision and immediate presence of a certified individual."}, {"id": "Q116", "chapter": 7, "chapterLabel": "7", "primaryTopic": "Personnel", "subtopic": "Thirty-Day Inspections", "difficulty": "Moderate", "question": "A property manager asks whether the employee performing the required 30-day inspections must be a certified extinguisher technician.\nAccording to NFPA 10, what is the correct answer?", "answers": {"A": "Yes, certification is always required.", "B": "No. Persons performing 30-day inspections are not required to be certified.", "C": "Only if the building contains Class B hazards.", "D": "Only for commercial occupancies."}, "correctAnswer": "B", "explanation": "Section 7.1.2.3 states that persons performing 30-day inspections are not required to be certified."}, {"id": "Q117", "chapter": 7, "chapterLabel": "7", "primaryTopic": "Replacement While Servicing", "subtopic": "Temporary Protection", "difficulty": "Moderate", "question": "A technician removes a fire extinguisher for maintenance and plans to return it later that afternoon.\nWhat should be done while the extinguisher is out of service?", "answers": {"A": "Nothing, provided the outage is temporary.", "B": "Replace it with an extinguisher suitable for the hazard and having at least an equal rating.", "C": "Place a warning sign where the extinguisher was located.", "D": "Notify the insurance carrier."}, "correctAnswer": "B", "explanation": "Section 7.1.3 requires extinguishers removed for maintenance or recharging to be replaced with a suitable extinguisher having at least an equal rating."}, {"id": "Q118", "chapter": 7, "chapterLabel": "7", "primaryTopic": "Tags and Labels", "subtopic": "Front Label Restrictions", "difficulty": "Moderate", "question": "A service company attaches a maintenance tag directly over the operating instructions on the front of the extinguisher.\nWhich statement best reflects NFPA 10?", "answers": {"A": "This is acceptable if the maintenance date remains visible.", "B": "Tags or labels recording inspection, maintenance, or recharging shall not be placed on the front of the extinguisher.", "C": "Only hydrostatic labels are prohibited.", "D": "Front placement is recommended."}, "correctAnswer": "B", "explanation": "Section 7.1.4.1 prohibits placing inspection, maintenance, or recharge tags on the front of the extinguisher."}, {"id": "Q119", "chapter": 7, "chapterLabel": "7", "primaryTopic": "Tags and Labels", "subtopic": "Permitted Labels", "difficulty": "Moderate", "question": "Which type of label is specifically permitted to appear on the front of a portable fire extinguisher?", "answers": {"A": "Maintenance record label.", "B": "Recharge tag.", "C": "Fire extinguisher use or classification label.", "D": "Hydrostatic test label."}, "correctAnswer": "C", "explanation": "Section 7.1.4.2 permits labels indicating extinguisher use or classification to be placed on the front."}, {"id": "Q120", "chapter": 7, "chapterLabel": "7", "primaryTopic": "Inspection", "subtopic": "Initial Inspection", "difficulty": "Moderate", "question": "A newly installed portable fire extinguisher has not yet been placed into service.\nAccording to NFPA 10, when is the first manual inspection required?", "answers": {"A": "Within 30 days.", "B": "Within 90 days.", "C": "When initially placed into service.", "D": "After the first annual maintenance."}, "correctAnswer": "C", "explanation": "Section 7.2.1.1 requires extinguishers to be manually inspected when initially placed into service."}, {"id": "Q121", "chapter": 7, "chapterLabel": "7", "primaryTopic": "Inspection", "subtopic": "Inspection Frequency", "difficulty": "Moderate", "question": "A facility manager asks how often portable fire extinguishers must be inspected after being placed into service.\nAccording to NFPA 10, what is the minimum required frequency?", "answers": {"A": "Weekly.", "B": "Monthly (at intervals not exceeding 30 days), either manually or by an electronic monitoring system.", "C": "Quarterly.", "D": "Annually."}, "correctAnswer": "B", "explanation": "Section 7.2.1.2 requires inspections at intervals not exceeding 30 days, either manually or through an approved electronic monitoring device/system."}, {"id": "Q122", "chapter": 7, "chapterLabel": "7", "primaryTopic": "Inspection Procedures", "subtopic": "Monthly Inspection", "difficulty": "Difficult", "question": "During a monthly inspection, a technician verifies that an extinguisher is in its designated location and has no obstruction to access. Which additional item is specifically required to be checked as part of the inspection procedures?", "answers": {"A": "The date of the last hydrostatic test only.", "B": "The pressure gauge reading or indicator to verify it is in the operable range or position.", "C": "The manufacturer's warranty period.", "D": "The extinguisher's internal condition."}, "correctAnswer": "B", "explanation": "Section 7.2.2 requires the monthly inspection to include verifying that the pressure gauge reading or indicator is in the operable range or position, along with the other listed inspection items.\nPerfect. We'll continue the numbering and stay strictly within Chapter 7."}, {"id": "Q123", "chapter": 7, "chapterLabel": "7 – Inspection, Maintenance, and Recharging", "primaryTopic": "Inspection Procedures", "subtopic": "Required Monthly Inspection Items", "difficulty": "Difficult", "question": "During a routine monthly inspection, a technician verifies that the extinguisher is in its designated location and unobstructed. Which additional inspection item is specifically required by NFPA 10?", "answers": {"A": "Verify the hydrostatic test date.", "B": "Verify the pressure gauge reading or indicator is in the operable range or position.", "C": "Remove the valve for an internal inspection.", "D": "Replace the tamper seal."}, "correctAnswer": "B", "explanation": "Section 7.2.2 requires verification that the pressure gauge reading or indicator is within the operable range or position during routine inspections."}, {"id": "Q124", "chapter": 7, "chapterLabel": "7", "primaryTopic": "Inspection Procedures", "subtopic": "Fullness Check", "difficulty": "Moderate", "question": "A technician is inspecting a cartridge-operated fire extinguisher that does not have a pressure gauge.\nAccording to NFPA 10, how should the technician verify that the extinguisher is full?", "answers": {"A": "Remove the valve.", "B": "Shake the extinguisher vigorously.", "C": "Determine fullness by weighing or hefting, as applicable.", "D": "Conduct annual maintenance."}, "correctAnswer": "C", "explanation": "Section 7.2.2 requires fullness to be determined by weighing or hefting for self-expelling, cartridge-operated, and pump tank extinguishers, as applicable."}, {"id": "Q125", "chapter": 7, "chapterLabel": "7", "primaryTopic": "Inspection Procedures", "subtopic": "Wheeled Fire Extinguishers", "difficulty": "Difficult", "question": "While inspecting a wheeled fire extinguisher, which additional components are specifically required to be inspected?", "answers": {"A": "Wall bracket and cabinet.", "B": "Tires, wheels, carriage, hose, and nozzle.", "C": "Mounting height only.", "D": "Recharge label only."}, "correctAnswer": "B", "explanation": "Section 7.2.2 requires inspection of the tires, wheels, carriage, hose, and nozzle on wheeled extinguishers."}, {"id": "Q126", "chapter": 7, "chapterLabel": "7", "primaryTopic": "Inspection Frequency", "subtopic": "More Frequent Inspections", "difficulty": "Difficult", "question": "A fire extinguisher is installed in an area where previous fires have occurred frequently.\nAccording to NFPA 10, what should the technician recommend?", "answers": {"A": "Annual maintenance only.", "B": "More frequent inspections.", "C": "Immediate replacement.", "D": "Hydrostatic testing."}, "correctAnswer": "B", "explanation": "Section 7.2.1.3 requires extinguishers to be inspected more frequently whenever circumstances warrant, including areas with a high frequency of fires."}, {"id": "Q127", "chapter": 7, "chapterLabel": "7", "primaryTopic": "Inspection Frequency", "subtopic": "Conditions Requiring Additional Inspection", "difficulty": "Difficult", "question": "Which of the following conditions is specifically identified by NFPA 10 as requiring additional visual inspection procedures?", "answers": {"A": "Recently painted walls.", "B": "Exposure to abnormal temperatures or corrosive atmospheres.", "C": "New carpeting.", "D": "Low building occupancy."}, "correctAnswer": "B", "explanation": "Section 7.2.2.1 identifies exposure to abnormal temperatures or corrosive atmospheres as a condition requiring additional inspection."}, {"id": "Q128", "chapter": 7, "chapterLabel": "7", "primaryTopic": "Inspection Procedures", "subtopic": "Additional Inspection Requirements", "difficulty": "Difficult", "question": "A fire extinguisher is located where mechanical damage is likely.\nDuring inspection, which additional item should specifically be verified?", "answers": {"A": "That the operating instructions remain legible and face outward.", "B": "That the hydrostatic test interval has expired.", "C": "That the extinguisher has been recharged within the past six months.", "D": "That the manufacturer still produces the extinguisher."}, "correctAnswer": "A", "explanation": "Section 7.2.2.2 requires verification that operating instructions are legible and face outward when additional inspections are required."}, {"id": "Q129", "chapter": 7, "chapterLabel": "7", "primaryTopic": "Corrective Action", "subtopic": "Deficiencies Found", "difficulty": "Moderate", "question": "During a monthly inspection, a technician discovers that a portable fire extinguisher has a damaged safety seal.\nAccording to NFPA 10, what action should be taken?", "answers": {"A": "Wait until the next annual maintenance.", "B": "Immediate corrective action.", "C": "Replace the extinguisher only if discharged.", "D": "Ignore the deficiency if the pressure gauge is normal."}, "correctAnswer": "B", "explanation": "Section 7.2.3 requires immediate corrective action whenever deficiencies identified during inspection are found."}, {"id": "Q130", "chapter": 7, "chapterLabel": "7", "primaryTopic": "Rechargeable Fire Extinguishers", "subtopic": "Inspection Deficiencies", "difficulty": "Moderate", "question": "A rechargeable portable fire extinguisher fails its monthly inspection because the pressure gauge is outside the operable range.\nAccording to NFPA 10, what should happen next?", "answers": {"A": "Continue using the extinguisher until annual maintenance.", "B": "Subject the extinguisher to the applicable maintenance procedures.", "C": "Immediately hydrostatically test the extinguisher.", "D": "Replace only the pressure gauge."}, "correctAnswer": "B", "explanation": "Section 7.2.3.1 requires rechargeable extinguishers with inspection deficiencies to undergo the applicable maintenance procedures."}, {"id": "Q131", "chapter": 7, "chapterLabel": "7", "primaryTopic": "Nonrechargeable Dry Chemical Extinguishers", "subtopic": "Inspection Deficiencies", "difficulty": "Difficult", "question": "A nonrechargeable dry chemical extinguisher is found to have a missing tamper seal during inspection.\nAccording to NFPA 10, which action is required?", "answers": {"A": "Install a new tamper seal and return it to service.", "B": "Remove the extinguisher from further use, discharge it, and destroy it at the direction of the owner or return it to the manufacturer.", "C": "Recharge the extinguisher.", "D": "Conduct hydrostatic testing."}, "correctAnswer": "B", "explanation": "Section 7.2.3.2 requires nonrechargeable dry chemical extinguishers with specified deficiencies to be removed from service, discharged, and destroyed or returned to the manufacturer."}, {"id": "Q132", "chapter": 7, "chapterLabel": "7", "primaryTopic": "Inspection Recordkeeping", "subtopic": "Manual Inspections", "difficulty": "Moderate", "question": "A facility performs manual monthly inspections on all portable fire extinguishers.\nAccording to NFPA 10, what records are required?", "answers": {"A": "Records only for extinguishers that passed inspection.", "B": "Records of all extinguishers inspected, including those requiring corrective action.", "C": "Records only for rechargeable extinguishers.", "D": "No written records are required."}, "correctAnswer": "B", "explanation": "Section 7.2.4.1 requires records of all manually inspected extinguishers, including those requiring corrective action.\nExcellent. The next section of Chapter 7 moves into one of the highest-value areas for the Texas Type B exam: maintenance frequency, internal examinations, and six-year maintenance. These are topics technicians encounter regularly and are commonly tested."}, {"id": "Q133", "chapter": 7, "chapterLabel": "7 – Inspection, Maintenance, and Recharging", "primaryTopic": "Maintenance", "subtopic": "Maintenance Frequency", "difficulty": "Moderate", "question": "A building owner asks how often portable fire extinguishers must receive maintenance if no deficiencies have been found during monthly inspections.\nAccording to NFPA 10, what should the technician explain?", "answers": {"A": "Maintenance is required only after the extinguisher has been discharged.", "B": "Maintenance shall be performed at intervals of not more than one year, at the time of hydrostatic testing, or whenever indicated by an inspection or electronic notification.", "C": "Maintenance is required every five years.", "D": "Maintenance is required only if directed by the AHJ."}, "correctAnswer": "B", "explanation": "Section 7.3.1.1 requires maintenance at intervals not exceeding one year, at hydrostatic test, or whenever indicated by inspection or electronic notification."}, {"id": "Q134", "chapter": 7, "chapterLabel": "7", "primaryTopic": "Stored-Pressure Extinguishers", "subtopic": "Six-Year Internal Examination", "difficulty": "Difficult", "question": "A technician is servicing a stored-pressure fire extinguisher that is subject to a 12-year hydrostatic test interval.\nAccording to NFPA 10, what additional maintenance requirement applies?", "answers": {"A": "Annual hydrostatic testing.", "B": "A six-year internal examination performed in accordance with the manufacturer's service manual.", "C": "Monthly internal examination.", "D": "Complete replacement at six years."}, "correctAnswer": "B", "explanation": "Section 7.3.1.2.1 requires stored-pressure extinguishers subject to a 12-year hydrostatic test interval to receive a six-year internal examination."}, {"id": "Q135", "chapter": 7, "chapterLabel": "7", "primaryTopic": "Six-Year Maintenance", "subtopic": "Resetting the Interval", "difficulty": "Difficult", "question": "A stored-pressure extinguisher undergoes hydrostatic testing and all applicable maintenance procedures today.\nWhen does the next six-year maintenance interval begin?", "answers": {"A": "On the original manufacturing date.", "B": "On the date of the last annual inspection.", "C": "Beginning on the date the applicable maintenance procedures were performed during the recharge or hydrostatic testing.", "D": "Six months after hydrostatic testing."}, "correctAnswer": "C", "explanation": "Section 7.3.1.2.1.1 states that when the applicable maintenance procedures are performed during periodic recharging or hydrostatic testing, the six-year interval begins on that date."}, {"id": "Q136", "chapter": 7, "chapterLabel": "7", "primaryTopic": "Nonrechargeable Fire Extinguishers", "subtopic": "Twelve-Year Removal", "difficulty": "Difficult", "question": "A nonrechargeable fire extinguisher has remained in service for 12 years from its date of manufacture.\nAccording to NFPA 10, what action is required?", "answers": {"A": "Perform hydrostatic testing.", "B": "Recharge the extinguisher.", "C": "Remove the extinguisher from service.", "D": "Conduct an internal examination and continue using it."}, "correctAnswer": "C", "explanation": "Section 7.3.1.2.1.3 states that nonrechargeable extinguishers are not required to undergo six-year maintenance or hydrostatic testing but shall be removed from service at a maximum interval of 12 years from the date of manufacture."}, {"id": "Q137", "chapter": 7, "chapterLabel": "7", "primaryTopic": "Carbon Dioxide Hose Assemblies", "subtopic": "Conductivity Testing", "difficulty": "Difficult", "question": "A technician is performing annual maintenance on a carbon dioxide fire extinguisher.\nWhich additional procedure is specifically required by NFPA 10?", "answers": {"A": "Leak testing of the cylinder.", "B": "Conductivity testing of the hose assembly.", "C": "Hydrostatic testing of the discharge horn.", "D": "Replacement of the siphon tube."}, "correctAnswer": "B", "explanation": "Section 7.3.1.3 requires carbon dioxide hose assemblies to undergo an annual conductivity test."}, {"id": "Q138", "chapter": 7, "chapterLabel": "7", "primaryTopic": "Carbon Dioxide Hose Assemblies", "subtopic": "Failed Conductivity Test", "difficulty": "Moderate", "question": "A carbon dioxide hose assembly fails its required conductivity test.\nAccording to NFPA 10, what should the technician do?", "answers": {"A": "Clean and retest the hose.", "B": "Replace the hose assembly.", "C": "Recharge the extinguisher only.", "D": "Replace the pressure gauge."}, "correctAnswer": "B", "explanation": "Section 7.3.1.3.1 requires hose assemblies that fail the conductivity test to be replaced."}, {"id": "Q139", "chapter": 7, "chapterLabel": "7", "primaryTopic": "Maintenance Procedures", "subtopic": "Mechanical Components", "difficulty": "Moderate", "question": "During annual maintenance, which of the following components must be thoroughly examined according to NFPA 10?", "answers": {"A": "Only the pressure gauge.", "B": "Only the extinguisher shell.", "C": "The mechanical parts of all fire extinguishers.", "D": "Only the discharge nozzle."}, "correctAnswer": "C", "explanation": "Section 7.3.2 requires maintenance procedures to include a thorough examination of the mechanical parts of all fire extinguishers."}, {"id": "Q140", "chapter": 7, "chapterLabel": "7", "primaryTopic": "Maintenance Procedures", "subtopic": "Internal and External Examination", "difficulty": "Difficult", "question": "A technician is performing annual maintenance on a rechargeable stored-pressure fire extinguisher.\nAccording to NFPA 10, what type of examination is required?", "answers": {"A": "External examination only.", "B": "Internal examination only.", "C": "Both internal and external examinations as applicable.", "D": "Hydrostatic testing only."}, "correctAnswer": "C", "explanation": "Section 7.3.2.1 requires internal examination where applicable, and Section 7.3.2.1.2 requires a thorough external examination in accordance with the standard."}, {"id": "Q141", "chapter": 7, "chapterLabel": "7", "primaryTopic": "Tamper Seals", "subtopic": "Rechargeable Extinguishers", "difficulty": "Moderate", "question": "A technician removes the tamper seal from a rechargeable fire extinguisher during maintenance.\nWhat must be done before returning the extinguisher to service?", "answers": {"A": "Reinstall the original tamper seal.", "B": "Install a new listed tamper seal.", "C": "Leave the tamper seal off until the next inspection.", "D": "Install a service collar instead of a tamper seal."}, "correctAnswer": "B", "explanation": "Section 7.3.2.2.1 requires that after the applicable maintenance procedures are completed, a new listed tamper seal shall be installed."}, {"id": "Q142", "chapter": 7, "chapterLabel": "7", "primaryTopic": "Physical Examination", "subtopic": "Visual Inspection During Maintenance", "difficulty": "Difficult", "question": "During annual maintenance, a technician performs the required visual examination of a portable fire extinguisher.\nWhich condition is specifically required to be verified?", "answers": {"A": "The manufacturer's warranty has not expired.", "B": "The operating instructions are present, legible, and facing forward.", "C": "The extinguisher has been hydrostatically tested within the last six months.", "D": "The extinguisher has a brass valve body."}, "correctAnswer": "B", "explanation": "Section 7.3.2.4 requires verification that the operating instructions are present, legible, and facing forward, along with checking for physical damage, corrosion, nozzle blockage, and legible HMIS information.\n\nExcellent. These questions continue through Chapter 7 only and are based on the uploaded pages covering maintenance recordkeeping, verification-of-service collars, recharging procedures, recharge agents, and dry chemical reuse."}, {"id": "Q143", "chapter": 7, "chapterLabel": "7 – Inspection, Maintenance, and Recharging", "primaryTopic": "Maintenance Recordkeeping", "subtopic": "Maintenance Tag Requirements", "difficulty": "Moderate", "question": "A technician completes annual maintenance on a portable fire extinguisher and prepares the maintenance tag.\nAccording to NFPA 10, which information must be included on the tag or label?", "answers": {"A": "The extinguisher's purchase price.", "B": "The month and year maintenance was performed, the identity of the person performing the work, and the name of the agency performing the work.", "C": "The building owner's insurance carrier.", "D": "The next hydrostatic test pressure."}, "correctAnswer": "B", "explanation": "Section 7.3.3 requires each extinguisher to have a tag or label indicating the month and year maintenance was performed, identifying the person performing the work, and identifying the agency performing the work."}, {"id": "Q144", "chapter": 7, "chapterLabel": "7", "primaryTopic": "Six-Year Service Label", "subtopic": "Required Information", "difficulty": "Difficult", "question": "A technician applies a six-year maintenance label after completing the required internal examination.\nWhich information is specifically required on the label?", "answers": {"A": "The hydrostatic test pressure and extinguisher serial number.", "B": "The month and year maintenance was performed, along with the name or initials of the person performing the maintenance and the agency performing the maintenance.", "C": "The owner's address.", "D": "The original manufacture date only."}, "correctAnswer": "B", "explanation": "Section 7.3.3.1.3 specifies the information that must appear on the six-year maintenance label."}, {"id": "Q145", "chapter": 7, "chapterLabel": "7", "primaryTopic": "Verification-of-Service Collar", "subtopic": "Maintenance Requirement", "difficulty": "Difficult", "question": "A technician completes maintenance that includes the required internal examination of a rechargeable extinguisher.\nAccording to NFPA 10, what additional item is generally required?", "answers": {"A": "A new pressure gauge.", "B": "A verification-of-service collar installed around the neck of the container.", "C": "A replacement hose assembly.", "D": "A hydrostatic test label."}, "correctAnswer": "B", "explanation": "Section 7.3.3.2.1 requires extinguishers undergoing maintenance that includes an internal examination, or those that have been recharged, to have a verification-of-service collar installed unless specifically exempted."}, {"id": "Q146", "chapter": 7, "chapterLabel": "7", "primaryTopic": "Verification-of-Service Collar", "subtopic": "Collar Design", "difficulty": "Difficult", "question": "While inspecting a verification-of-service collar, a technician notices that it cannot be removed without completely removing the valve assembly.\nWhich statement best reflects NFPA 10?", "answers": {"A": "The collar has been installed correctly.", "B": "The collar should be removable without removing the valve.", "C": "Only hydrostatic test labels require valve removal.", "D": "Verification-of-service collars are optional."}, "correctAnswer": "A", "explanation": "Section 7.3.3.2.1.1 requires the collar to be a single circular piece that cannot be removed over the neck of the container unless the valve is completely removed."}, {"id": "Q147", "chapter": 7, "chapterLabel": "7", "primaryTopic": "Verification-of-Service Collar", "subtopic": "Operational Requirements", "difficulty": "Moderate", "question": "After installing a verification-of-service collar, a technician discovers that it interferes with operating the fire extinguisher.\nAccording to NFPA 10, what should be done?", "answers": {"A": "Leave it because the collar documents maintenance.", "B": "Replace it with a collar that does not interfere with operation.", "C": "Remove the operating instructions.", "D": "Install a second collar."}, "correctAnswer": "B", "explanation": "Section 7.3.3.2.1.2 requires that the verification-of-service collar shall not interfere with the operation of the fire extinguisher."}, {"id": "Q148", "chapter": 7, "chapterLabel": "7", "primaryTopic": "Recharging", "subtopic": "When Recharging Is Required", "difficulty": "Moderate", "question": "A rechargeable portable fire extinguisher has been partially discharged during employee training.\nAccording to NFPA 10, when must it be recharged?", "answers": {"A": "At the next annual maintenance.", "B": "Only after it has been completely discharged.", "C": "After any use or whenever indicated by an inspection or maintenance.", "D": "Every six years."}, "correctAnswer": "C", "explanation": "Section 7.4.1.1 requires all rechargeable fire extinguishers to be recharged after any use or whenever indicated by inspection or maintenance."}, {"id": "Q149", "chapter": 7, "chapterLabel": "7", "primaryTopic": "Recharging", "subtopic": "Manufacturer's Recommendations", "difficulty": "Moderate", "question": "A technician plans to recharge a fire extinguisher using procedures developed by the service company instead of the manufacturer's instructions.\nAccording to NFPA 10, which statement is correct?", "answers": {"A": "Company procedures always take precedence.", "B": "The manufacturer's recommendations shall be followed when recharging.", "C": "Either procedure is acceptable.", "D": "Manufacturer recommendations apply only to carbon dioxide extinguishers."}, "correctAnswer": "B", "explanation": "Section 7.4.1.2 requires the manufacturer's recommendations to be followed whenever recharging is performed."}, {"id": "Q150", "chapter": 7, "chapterLabel": "7", "primaryTopic": "Recharging", "subtopic": "Verifying Agent Quantity", "difficulty": "Moderate", "question": "After recharging a portable fire extinguisher, how should the technician verify the correct amount of recharge agent?", "answers": {"A": "By measuring internal pressure only.", "B": "By weighing the extinguisher.", "C": "By shaking the extinguisher.", "D": "By visually estimating the fill level."}, "correctAnswer": "B", "explanation": "Section 7.4.1.3 requires the amount of recharge agent to be verified by weighing."}, {"id": "Q151", "chapter": 7, "chapterLabel": "7", "primaryTopic": "Recharge Agents", "subtopic": "Approved Agents", "difficulty": "Difficult", "question": "A technician has run out of the manufacturer's specified extinguishing agent and proposes using another agent with similar extinguishing characteristics.\nAccording to NFPA 10, which agent may be used?", "answers": {"A": "Any commercially available extinguishing agent.", "B": "Only the agent specified on the nameplate or an agent proven to have equal chemical composition, physical characteristics, and fire-extinguishing capabilities.", "C": "Any dry chemical agent.", "D": "Any agent approved by the building owner."}, "correctAnswer": "B", "explanation": "Section 7.4.3.1.1 permits only the specified agent or one proven to have equal chemical composition, physical characteristics, and extinguishing capability."}, {"id": "Q152", "chapter": 7, "chapterLabel": "7", "primaryTopic": "Recharge Agents", "subtopic": "Mixing Dry Chemicals", "difficulty": "Difficult", "question": "A technician considers mixing a multipurpose dry chemical with an alkaline-based dry chemical during recharging because both agents are available in the shop.\nAccording to NFPA 10, what is the correct action?", "answers": {"A": "Mix the agents thoroughly before charging.", "B": "Mix the agents only if they are manufactured by the same company.", "C": "Do not mix multipurpose dry chemicals with alkaline-based dry chemicals.", "D": "Mixing is permitted if the extinguisher is immediately tested."}, "correctAnswer": "C", "explanation": "Section 7.4.3.2 specifically prohibits mixing multipurpose dry chemicals with alkaline-based dry chemicals.\n\nPerfect. This continues Chapter 7 only, based on the uploaded NFPA 10 pages. These questions cover the remaining recharging requirements, approved recharge agents, dry chemical reuse, pressurization, and recharge records."}, {"id": "Q153", "chapter": 7, "chapterLabel": "7 – Inspection, Maintenance, and Recharging", "primaryTopic": "Recharge Agents", "subtopic": "Reusing Dry Chemical", "difficulty": "Difficult", "question": "A technician has recovered uncontaminated dry chemical from an extinguisher that was discharged during maintenance testing. The technician plans to reuse the agent in another extinguisher.\nAccording to NFPA 10, under what condition is this permitted?", "answers": {"A": "Dry chemical may never be reused.", "B": "The recovered agent may be reused only if it is thoroughly checked for contamination, remains suitable for reuse, and is reused only in accordance with the manufacturer's instructions.", "C": "The recovered agent may be reused in any extinguisher of the same size.", "D": "Reuse is permitted only if the extinguisher belongs to the same customer."}, "correctAnswer": "B", "explanation": "NFPA 10 permits the reuse of dry chemical only when the recovered agent is free of contamination, remains suitable for service, and is reused in accordance with the manufacturer's instructions."}, {"id": "Q154", "chapter": 7, "chapterLabel": "7", "primaryTopic": "Recharge Agents", "subtopic": "Contaminated Dry Chemical", "difficulty": "Moderate", "question": "While preparing to recharge a portable fire extinguisher, a technician discovers that the recovered dry chemical has become contaminated with moisture and debris.\nAccording to NFPA 10, what should the technician do?", "answers": {"A": "Dry the agent and reuse it.", "B": "Mix the contaminated agent with new dry chemical.", "C": "Discard the contaminated dry chemical and recharge the extinguisher with an approved agent.", "D": "Sift the debris from the agent and continue using it."}, "correctAnswer": "C", "explanation": "Recovered dry chemical that is contaminated or no longer suitable for service shall not be reused. The extinguisher must be recharged with an approved recharge agent."}, {"id": "Q155", "chapter": 7, "chapterLabel": "7", "primaryTopic": "Recharging Procedures", "subtopic": "Pressurizing Rechargeable Extinguishers", "difficulty": "Difficult", "question": "A technician finishes refilling a stored-pressure fire extinguisher and prepares to pressurize it.\nAccording to NFPA 10, which pressurizing gas should be used unless the manufacturer specifies otherwise?", "answers": {"A": "Oxygen", "B": "Compressed air or the gas specified by the manufacturer.", "C": "Carbon dioxide for all extinguisher types.", "D": "Helium."}, "correctAnswer": "B", "explanation": "NFPA 10 requires extinguishers to be pressurized using the gas specified by the manufacturer. Where permitted, compressed air or nitrogen may be used as specified."}, {"id": "Q156", "chapter": 7, "chapterLabel": "7", "primaryTopic": "Recharging Procedures", "subtopic": "Pressure Verification", "difficulty": "Moderate", "question": "After pressurizing a stored-pressure extinguisher, what should the technician verify before returning it to service?", "answers": {"A": "Only that the tamper seal has been installed.", "B": "That the extinguisher has reached the pressure specified by the manufacturer and the pressure indicator is in the operable range.", "C": "That the extinguisher weighs more than it did before service.", "D": "That the extinguisher has a new wall bracket."}, "correctAnswer": "B", "explanation": "Following recharging and pressurization, the technician must verify that the extinguisher is pressurized according to the manufacturer's requirements and that the pressure indicator shows an operable condition."}, {"id": "Q157", "chapter": 7, "chapterLabel": "7", "primaryTopic": "Pressure Gauges", "subtopic": "Replacement", "difficulty": "Difficult", "question": "A pressure gauge is found to be damaged during maintenance.\nAccording to NFPA 10, which replacement is appropriate?", "answers": {"A": "Any pressure gauge with the same diameter.", "B": "A pressure gauge specified by the extinguisher manufacturer.", "C": "Any gauge that reads to at least 300 psi.", "D": "A gauge removed from another extinguisher."}, "correctAnswer": "B", "explanation": "Replacement components, including pressure gauges, are required to comply with the manufacturer's specifications."}, {"id": "Q158", "chapter": 7, "chapterLabel": "7", "primaryTopic": "Recharging Procedures", "subtopic": "Manufacturer's Instructions", "difficulty": "Moderate", "question": "A service company develops its own recharge procedure because it believes it is more efficient than the manufacturer's process.\nAccording to NFPA 10, what is the technician's obligation?", "answers": {"A": "Follow the company's procedure.", "B": "Follow whichever procedure requires less time.", "C": "Follow the manufacturer's recharge instructions.", "D": "Follow the building owner's preference."}, "correctAnswer": "C", "explanation": "NFPA 10 consistently requires maintenance and recharging to be performed in accordance with the manufacturer's instructions."}, {"id": "Q159", "chapter": 7, "chapterLabel": "7", "primaryTopic": "Recharging", "subtopic": "Returning to Service", "difficulty": "Moderate", "question": "A technician has completed recharging a portable fire extinguisher.\nBefore placing it back into its designated location, which of the following should also be confirmed?", "answers": {"A": "The extinguisher is fully assembled, properly pressurized, correctly marked, and ready for service.", "B": "The extinguisher has been hydrostatically tested.", "C": "The extinguisher has a new hose regardless of condition.", "D": "The extinguisher has been discharged for testing."}, "correctAnswer": "A", "explanation": "After recharging, the extinguisher should be fully assembled, properly pressurized, and ready for immediate service before being returned to its designated location."}, {"id": "Q160", "chapter": 7, "chapterLabel": "7", "primaryTopic": "Recharge Documentation", "subtopic": "Service Records", "difficulty": "Moderate", "question": "A technician completes recharging a fire extinguisher but forgets to document the service performed.\nAccording to NFPA 10, why is this a problem?", "answers": {"A": "Recharge activities are required to be documented as part of the extinguisher's maintenance history.", "B": "Documentation is required only after hydrostatic testing.", "C": "Documentation is optional if the extinguisher was only partially discharged.", "D": "Recharge records are required only for wheeled extinguishers."}, "correctAnswer": "A", "explanation": "NFPA 10 requires maintenance and recharge activities to be properly documented so the extinguisher's service history can be verified."}, {"id": "Q161", "chapter": 7, "chapterLabel": "7", "primaryTopic": "Technician Responsibility", "subtopic": "Returning Equipment to Service", "difficulty": "Difficult", "question": "A technician finishes servicing an extinguisher late in the day and considers leaving it on the workbench until the following morning before returning it to its assigned location.\nAccording to the principles of NFPA 10, what is the best course of action?", "answers": {"A": "Return the extinguisher to its designated location once it has been properly serviced and is ready for use, or provide an equivalent replacement if it remains out of service.", "B": "Leave it on the workbench overnight.", "C": "Store it in the service vehicle until the next inspection.", "D": "Place it in any convenient location within the building."}, "correctAnswer": "A", "explanation": "NFPA 10 requires extinguishers to be maintained in their designated locations when ready for service. If an extinguisher is temporarily unavailable, an equivalent replacement must be provided."}, {"id": "Q162", "chapter": 7, "chapterLabel": "7", "primaryTopic": "Inspection, Maintenance, and Recharging", "subtopic": "Integrated Compliance", "difficulty": "Difficult", "question": "A technician completes annual maintenance on a rechargeable portable fire extinguisher. Which sequence best reflects NFPA 10 requirements before the extinguisher is returned to service?", "answers": {"A": "Perform maintenance, recharge if required, verify the correct agent quantity and operating pressure, install the required tamper seal and maintenance documentation, and return the extinguisher to its designated location.", "B": "Recharge the extinguisher, return it to service immediately, and complete the paperwork later.", "C": "Perform maintenance only if the extinguisher has been discharged.", "D": "Replace the extinguisher regardless of its condition."}, "correctAnswer": "A", "explanation": "NFPA 10 requires maintenance and any necessary recharging to be completed in accordance with the manufacturer's instructions. Before returning the extinguisher to service, the technician must verify the proper agent quantity and operating pressure, install required seals and maintenance documentation, and ensure the extinguisher is ready for immediate use in its designated location.\n\nI analyzed all four uploaded pages (10-17 through 10-20).\nThese pages cover essentially the first major half of Chapter 8 – Hydrostatic Testing, including:\nGeneral requirements\nPersonnel qualifications\nTest equipment\nDrying equipment\nHydrostatic retest intervals (Table 8.3.1)\nCylinders and cartridges\nHose assemblies\nExtinguisher examination\nCylinder rejection criteria\nTesting procedures\nTest pressures\nRecording hydrostatic tests\nCondemning extinguishers\nThis chapter is extremely technical and very likely to produce exam questions. Below is the first set."}, {"id": "Q163", "chapter": 8, "chapterLabel": "8 – Hydrostatic Testing", "primaryTopic": "General Requirements", "subtopic": "Components Requiring Hydrostatic Testing", "difficulty": "Moderate", "question": "A technician is preparing several extinguisher components for testing and asks which items fall under the hydrostatic testing requirements of NFPA 10.\nWhich response is correct?", "answers": {"A": "Only extinguisher cylinders.", "B": "Pressure vessels used as fire extinguishers and specified extinguisher components.", "C": "Only carbon dioxide cylinders.", "D": "Only stored-pressure extinguishers."}, "correctAnswer": "B", "explanation": "Section 8.1.1 requires hydrostatic testing of pressure vessels used as fire extinguishers and specified extinguisher components."}, {"id": "Q164", "chapter": 8, "chapterLabel": "8", "primaryTopic": "Personnel", "subtopic": "Qualifications", "difficulty": "Moderate", "question": "A fire protection company plans to assign hydrostatic testing duties to a newly hired technician.\nAccording to NFPA 10, which qualification is required?", "answers": {"A": "Completion of annual maintenance training only.", "B": "Training in pressure testing procedures and safeguards, appropriate equipment and facilities, and certification by an acceptable organization.", "C": "Five years of extinguisher servicing experience.", "D": "Factory training from every extinguisher manufacturer."}, "correctAnswer": "B", "explanation": "Section 8.1.2 requires hydrostatic testing personnel to be properly trained and certified."}, {"id": "Q165", "chapter": 8, "chapterLabel": "8", "primaryTopic": "Hydrostatic Testing", "subtopic": "Test Medium", "difficulty": "Difficult", "question": "A technician proposes performing a hydrostatic test using compressed air because water is unavailable.\nAccording to NFPA 10, what should the supervising technician advise?", "answers": {"A": "Compressed air may always be substituted.", "B": "Hydrostatic testing shall be conducted using water or another compatible noncompressible fluid.", "C": "Either water or compressed air is acceptable.", "D": "Nitrogen is preferred."}, "correctAnswer": "B", "explanation": "Section 8.1.4 requires hydrostatic testing to be performed using water or another compatible noncompressible fluid."}, {"id": "Q166", "chapter": 8, "chapterLabel": "8", "primaryTopic": "Hydrostatic Testing", "subtopic": "Air Removal", "difficulty": "Moderate", "question": "Before beginning a hydrostatic test, what must be done with any air remaining inside the extinguisher cylinder?", "answers": {"A": "Compress it.", "B": "Vent all air before testing.", "C": "Leave the air in place.", "D": "Replace it with nitrogen."}, "correctAnswer": "B", "explanation": "Section 8.1.4.2 requires all air to be vented before hydrostatic testing."}, {"id": "Q167", "chapter": 8, "chapterLabel": "8", "primaryTopic": "Test Equipment", "subtopic": "Pressure Gauge Accuracy", "difficulty": "Difficult", "question": "A technician is verifying the calibration requirements for a hydrostatic test pressure gauge.\nAccording to NFPA 10, what level of accuracy is required?", "answers": {"A": "±5%", "B": "±2%", "C": "±0.5% or better of the full range of the gauge.", "D": "±10%."}, "correctAnswer": "C", "explanation": "Section 8.2.1.1 requires test pressure gauges to be certified accurate to ±0.5 percent or better of the full gauge range."}, {"id": "Q168", "chapter": 8, "chapterLabel": "8", "primaryTopic": "Test Equipment", "subtopic": "Calibration", "difficulty": "Moderate", "question": "How often must pressure gauges used on hydrostatic test equipment be calibrated?", "answers": {"A": "Monthly.", "B": "Quarterly.", "C": "At least semiannually.", "D": "Every five years."}, "correctAnswer": "C", "explanation": "Section 8.2.1.4 requires pressure gauges used on test equipment to be calibrated at least semiannually."}, {"id": "Q169", "chapter": 8, "chapterLabel": "8", "primaryTopic": "Hydrostatic Retest Intervals", "subtopic": "Stored-Pressure Water Extinguishers", "difficulty": "Difficult", "question": "A stored-pressure water fire extinguisher is due for hydrostatic testing.\nAccording to Table 8.3.1, what is the required hydrostatic retest interval?", "answers": {"A": "3 years.", "B": "5 years.", "C": "6 years.", "D": "12 years."}, "correctAnswer": "B", "explanation": "Table 8.3.1 specifies a 5-year hydrostatic retest interval for stored-pressure water extinguishers."}, {"id": "Q170", "chapter": 8, "chapterLabel": "8", "primaryTopic": "Hydrostatic Retest Intervals", "subtopic": "Stored-Pressure Dry Chemical", "difficulty": "Difficult", "question": "A stored-pressure dry chemical extinguisher with a mild steel shell is being evaluated for hydrostatic testing.\nAccording to Table 8.3.1, what is the required retest interval?", "answers": {"A": "5 years.", "B": "6 years.", "C": "10 years.", "D": "12 years."}, "correctAnswer": "D", "explanation": "Table 8.3.1 requires stored-pressure dry chemical extinguishers with mild steel, brazed brass, or aluminum shells to be hydrostatically tested every 12 years."}, {"id": "Q171", "chapter": 8, "chapterLabel": "8", "primaryTopic": "Hydrostatic Retesting", "subtopic": "Overdue Retest", "difficulty": "Moderate", "question": "A technician discovers that a rechargeable fire extinguisher is beyond its required hydrostatic retest date.\nAccording to NFPA 10, what action is permitted?", "answers": {"A": "Recharge the extinguisher and schedule testing later.", "B": "Recharge the extinguisher only if the pressure gauge is normal.", "C": "Do not recharge the extinguisher until the required hydrostatic retest has been completed.", "D": "Return the extinguisher to service immediately."}, "correctAnswer": "C", "explanation": "Section 8.3.1.2 states that a rechargeable extinguisher shall not be recharged if it is beyond its specified hydrostatic retest date."}, {"id": "Q172", "chapter": 8, "chapterLabel": "8", "primaryTopic": "Hose Assemblies", "subtopic": "Hydrostatic Testing", "difficulty": "Difficult", "question": "A technician asks whether fire extinguisher hose assemblies equipped with a shutoff nozzle require hydrostatic testing.\nAccording to NFPA 10, which response is correct?", "answers": {"A": "No, only cylinders require hydrostatic testing.", "B": "Yes, a hydrostatic test shall be performed on hose assemblies equipped with a shutoff nozzle.", "C": "Hose assemblies are tested only during annual maintenance.", "D": "Only carbon dioxide hose assemblies require testing."}, "correctAnswer": "B", "explanation": "Section 8.3.3.1 requires hydrostatic testing of fire extinguisher hose assemblies equipped with a shutoff nozzle.\nExcellent. The next section of Chapter 8 focuses on the hydrostatic testing process itself, including extinguisher examination, cylinder rejection criteria, testing procedures, and low-pressure cylinder requirements. These are highly technical and well suited for PSI-style questions."}, {"id": "Q173", "chapter": 8, "chapterLabel": "8 – Hydrostatic Testing", "primaryTopic": "Extinguisher Examination", "subtopic": "Damage Requiring Action", "difficulty": "Difficult", "question": "During an annual service visit, a technician discovers that a stored-pressure fire extinguisher has a large dent and visible corrosion on the cylinder.\nAccording to NFPA 10, what should be done?", "answers": {"A": "Return the extinguisher to service if the pressure gauge is in the operable range.", "B": "Condemn the extinguisher or subject it to hydrostatic retesting in accordance with NFPA 10.", "C": "Recharge the extinguisher and continue using it.", "D": "Replace only the pressure gauge."}, "correctAnswer": "B", "explanation": "Section 8.4.1 requires extinguishers showing evidence of dents, mechanical injury, or corrosion indicating weakness to be condemned or hydrostatically retested, as applicable."}, {"id": "Q174", "chapter": 8, "chapterLabel": "8", "primaryTopic": "Cylinder Examination", "subtopic": "Repair History", "difficulty": "Difficult", "question": "A technician is preparing to hydrostatically test a fire extinguisher cylinder. During the inspection, evidence is found that the cylinder has previously been repaired by welding.\nAccording to NFPA 10, what is the correct action?", "answers": {"A": "Perform the hydrostatic test as scheduled.", "B": "Condemn the cylinder; it shall not be hydrostatically tested.", "C": "Reduce the test pressure by 10 percent.", "D": "Recharge the extinguisher without testing."}, "correctAnswer": "B", "explanation": "Section 8.4.2 states that cylinders repaired by soldering, welding, brazing, or patching compounds shall not be hydrostatically tested and shall be condemned or destroyed."}, {"id": "Q175", "chapter": 8, "chapterLabel": "8", "primaryTopic": "Cylinder Examination", "subtopic": "Thread Damage", "difficulty": "Moderate", "question": "During a visual examination before hydrostatic testing, the technician discovers that the cylinder threads are badly worn and nicked.\nAccording to NFPA 10, what should be done?", "answers": {"A": "Repair the threads and continue testing.", "B": "Hydrostatically test the cylinder at a reduced pressure.", "C": "Do not hydrostatically test the cylinder; condemn it.", "D": "Recharge the extinguisher and monitor it annually."}, "correctAnswer": "C", "explanation": "Section 8.4.2 identifies worn, corroded, broken, cracked, or nicked cylinder threads as a condition requiring condemnation rather than hydrostatic testing."}, {"id": "Q176", "chapter": 8, "chapterLabel": "8", "primaryTopic": "Cylinder Examination", "subtopic": "Fire Damage", "difficulty": "Difficult", "question": "A technician is evaluating a portable fire extinguisher that was recovered from a building fire. The extinguisher shows evidence of exposure to excessive heat and flame.\nAccording to NFPA 10, which action is required?", "answers": {"A": "Recharge the extinguisher after replacing the hose.", "B": "Hydrostatically test the extinguisher.", "C": "Do not hydrostatically test the extinguisher; condemn it.", "D": "Continue using the extinguisher if it passes an annual inspection."}, "correctAnswer": "C", "explanation": "Section 8.4.2 lists exposure to excessive heat, flame, or fire as a condition requiring condemnation rather than hydrostatic testing."}, {"id": "Q177", "chapter": 8, "chapterLabel": "8", "primaryTopic": "Testing Procedures", "subtopic": "Test Duration", "difficulty": "Moderate", "question": "While performing a hydrostatic test, a trainee asks how long the required test pressure must be maintained.\nAccording to NFPA 10, what is the minimum required duration?", "answers": {"A": "10 seconds.", "B": "15 seconds.", "C": "30 seconds.", "D": "60 seconds."}, "correctAnswer": "C", "explanation": "Section 8.5.1.1 requires the test pressure to be maintained for a minimum of 30 seconds, and longer if necessary to allow complete expansion and visual examination."}, {"id": "Q178", "chapter": 8, "chapterLabel": "8", "primaryTopic": "Testing Procedures", "subtopic": "Preparation", "difficulty": "Difficult", "question": "Before hydrostatic testing begins, which of the following is required?", "answers": {"A": "Leave all valves and hose assemblies installed.", "B": "Remove all valves, internal parts, and hose assemblies, and empty the extinguisher before testing, except where specifically permitted by the manufacturer.", "C": "Recharge the extinguisher first.", "D": "Pressurize the extinguisher with nitrogen."}, "correctAnswer": "B", "explanation": "Section 8.5.1.2 requires removal of valves, internal parts, and hose assemblies and that the extinguisher be emptied before testing, subject to limited manufacturer-specific exceptions."}, {"id": "Q179", "chapter": 8, "chapterLabel": "8", "primaryTopic": "Low-Pressure Cylinders", "subtopic": "Stored-Pressure Extinguishers", "difficulty": "Difficult", "question": "A technician is preparing a stored-pressure extinguisher for hydrostatic testing.\nAccording to NFPA 10, what must be done with the valve assembly?", "answers": {"A": "Leave it installed.", "B": "Remove the valve and replace it with a test bonnet or adapter.", "C": "Tighten the valve before testing.", "D": "Replace the valve with a pressure gauge."}, "correctAnswer": "B", "explanation": "Section 8.5.2.3 requires removal of the valve from stored-pressure extinguishers and replacement with a test bonnet or adapter before hydrostatic testing."}, {"id": "Q180", "chapter": 8, "chapterLabel": "8", "primaryTopic": "Low-Pressure Cylinders", "subtopic": "Cylinder Distortion", "difficulty": "Difficult", "question": "During hydrostatic testing, a technician observes permanent distortion of the extinguisher cylinder.\nAccording to NFPA 10, what is the correct action?", "answers": {"A": "Recharge the extinguisher.", "B": "Repeat the hydrostatic test.", "C": "Reject the cylinder.", "D": "Install a new pressure gauge."}, "correctAnswer": "C", "explanation": "Section 8.5.2.5 states that any distortion of the cylinder is cause for rejection."}, {"id": "Q181", "chapter": 8, "chapterLabel": "8", "primaryTopic": "Low-Pressure Cylinders", "subtopic": "Pressure Loss", "difficulty": "Difficult", "question": "During a hydrostatic test, the technician notices a drop in pressure on the test gauge, indicating a leak.\nAccording to NFPA 10, what should be done?", "answers": {"A": "Continue testing until pressure stabilizes.", "B": "Reject the cylinder or perform a retest, as appropriate.", "C": "Recharge the extinguisher immediately.", "D": "Increase the test pressure by 10 percent."}, "correctAnswer": "B", "explanation": "Section 8.5.2.6 states that a drop in test pressure indicating a leak is cause for rejection or retesting."}, {"id": "Q182", "chapter": 8, "chapterLabel": "8", "primaryTopic": "Cylinder Drying", "subtopic": "Heat Limit", "difficulty": "Moderate", "question": "After a cylinder successfully passes hydrostatic testing, heated air is used to dry the interior.\nAccording to NFPA 10, what is the maximum permitted temperature inside the cylinder?", "answers": {"A": "100°F (38°C)", "B": "125°F (52°C)", "C": "150°F (66°C)", "D": "200°F (93°C)"}, "correctAnswer": "C", "explanation": "Section 8.5.2.8 limits the internal drying temperature to 150°F (66°C) when heated air is used.\n\nExcellent. This completes the remaining major concepts from the uploaded Chapter 8 pages, covering high-pressure cylinders, hose assemblies, hydrostatic test pressures, recordkeeping, and condemning extinguishers."}, {"id": "Q183", "chapter": 8, "chapterLabel": "8 – Hydrostatic Testing", "primaryTopic": "High-Pressure Cylinders", "subtopic": "Testing Standards", "difficulty": "Difficult", "question": "A technician is preparing to hydrostatically test a high-pressure cylinder used with a portable fire extinguisher.\nAccording to NFPA 10, which standards govern the hydrostatic testing procedure?", "answers": {"A": "NFPA 13 only.", "B": "OSHA standards.", "C": "TC, DOT, and CGA C-1 procedures, as applicable.", "D": "Manufacturer recommendations only."}, "correctAnswer": "C", "explanation": "Section 8.5.3.1 requires hydrostatic testing of high-pressure cylinders and cartridges to comply with applicable TC, DOT, and CGA C-1 procedures."}, {"id": "Q184", "chapter": 8, "chapterLabel": "8", "primaryTopic": "High-Pressure Cylinders", "subtopic": "Drying After Testing", "difficulty": "Moderate", "question": "After a high-pressure cylinder successfully passes hydrostatic testing, what must be done before it is returned to service?", "answers": {"A": "Recharge immediately.", "B": "Thoroughly dry the cylinder internally.", "C": "Paint the exterior.", "D": "Replace the valve regardless of condition."}, "correctAnswer": "B", "explanation": "Section 8.5.3.2 requires cylinders passing hydrostatic testing to be thoroughly dried internally before being returned to service."}, {"id": "Q185", "chapter": 8, "chapterLabel": "8", "primaryTopic": "High-Pressure Cylinders", "subtopic": "Heated Air Drying", "difficulty": "Moderate", "question": "A technician uses heated air to dry a high-pressure cylinder after hydrostatic testing.\nAccording to NFPA 10, what is the maximum allowable internal temperature?", "answers": {"A": "100°F (38°C)", "B": "125°F (52°C)", "C": "150°F (66°C)", "D": "212°F (100°C)"}, "correctAnswer": "C", "explanation": "Section 8.5.3.3 limits the drying temperature inside high-pressure cylinders to 150°F (66°C)."}, {"id": "Q186", "chapter": 8, "chapterLabel": "8", "primaryTopic": "Hose Assemblies", "subtopic": "Preparation for Testing", "difficulty": "Difficult", "question": "A technician is preparing a hose assembly for hydrostatic testing.\nAccording to NFPA 10, what should be done with the discharge valve before testing?", "answers": {"A": "Leave it installed.", "B": "Remove the discharge valve without removing the hose couplings.", "C": "Replace it with a pressure gauge.", "D": "Permanently cap the hose."}, "correctAnswer": "B", "explanation": "Section 8.5.4.1 requires the discharge valve to be removed from the hose assembly without removing the hose couplings."}, {"id": "Q187", "chapter": 8, "chapterLabel": "8", "primaryTopic": "Hose Assemblies", "subtopic": "Pressurization", "difficulty": "Difficult", "question": "While hydrostatically testing a hose assembly, how quickly should the technician increase the pressure?", "answers": {"A": "As rapidly as possible.", "B": "Reach the required test pressure in approximately one minute.", "C": "Increase pressure over at least five minutes.", "D": "Increase pressure only by hand pumping."}, "correctAnswer": "B", "explanation": "Section 8.5.4.6 requires pressure to be applied at a rate that reaches the required test pressure in one minute."}, {"id": "Q188", "chapter": 8, "chapterLabel": "8", "primaryTopic": "Hose Assemblies", "subtopic": "Test Duration", "difficulty": "Moderate", "question": "Once the required hydrostatic test pressure has been reached for a hose assembly, how long must the pressure be maintained?", "answers": {"A": "30 seconds.", "B": "45 seconds.", "C": "One minute.", "D": "Two minutes."}, "correctAnswer": "C", "explanation": "Section 8.5.4.7 requires test pressure for hose assemblies to be maintained for a minimum of one minute."}, {"id": "Q189", "chapter": 8, "chapterLabel": "8", "primaryTopic": "Hydrostatic Test Pressures", "subtopic": "Stored-Pressure Extinguishers", "difficulty": "Difficult", "question": "A technician is preparing to hydrostatically test a stored-pressure fire extinguisher.\nAccording to NFPA 10, what pressure should generally be used?", "answers": {"A": "Twice the service pressure.", "B": "The pressure specified on the extinguisher nameplate.", "C": "300 psi for every extinguisher.", "D": "3,000 psi for every extinguisher."}, "correctAnswer": "B", "explanation": "Section 8.6.1.1 requires stored-pressure extinguishers to be hydrostatically tested at the pressure specified on the extinguisher nameplate."}, {"id": "Q190", "chapter": 8, "chapterLabel": "8", "primaryTopic": "Hydrostatic Test Records", "subtopic": "Record Retention", "difficulty": "Moderate",
