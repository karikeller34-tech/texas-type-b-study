 "question": "A hydrostatic testing company asks how long records of hydrostatic tests must be retained.\nAccording to NFPA 10, what is required?", "answers": {"A": "One year.", "B": "Five years.", "C": "Until the expiration of the test period or until the cylinder is tested again, whichever occurs first.", "D": "Permanently."}, "correctAnswer": "C", "explanation": "Section 8.7.1 requires hydrostatic test records to be maintained until the test period expires or until the cylinder is tested again, whichever occurs first."}, {"id": "Q191", "chapter": 8, "chapterLabel": "8", "primaryTopic": "Condemning Extinguishers", "subtopic": "Failed Testing", "difficulty": "Difficult", "question": "A fire extinguisher cylinder fails its hydrostatic pressure test.\nAccording to NFPA 10, what action is required?", "answers": {"A": "Recharge and return it to service.", "B": "Repeat the hydrostatic test immediately.", "C": "Condemn or destroy the cylinder.", "D": "Reduce the service pressure."}, "correctAnswer": "C", "explanation": "Section 8.8.1 requires a cylinder, shell, or cartridge that fails hydrostatic testing or the required visual examination to be condemned or destroyed."}, {"id": "Q192", "chapter": 8, "chapterLabel": "8", "primaryTopic": "Condemned Cylinders", "subtopic": "Marking Requirements", "difficulty": "Difficult", "question": "A technician condemns a fire extinguisher cylinder following a failed hydrostatic test.\nAccording to NFPA 10, how must the cylinder be marked?", "answers": {"A": "Stamp \"OUT OF SERVICE\" on the cylinder.", "B": "Apply a red adhesive label.", "C": "Stamp the cylinder with the word \"CONDEMNED\" on the top, head, shoulder, or neck using a steel stamp.", "D": "Remove the nameplate and discard the cylinder without marking it."}, "correctAnswer": "C", "explanation": "Section 8.8.2.1 requires condemned cylinders to be permanently stamped \"CONDEMNED\" on the top, head, shoulder, or neck with a steel stamp."}];
const state={quiz:[],index:0,correct:0,answered:false,answers:[]};const $=id=>document.getElementById(id),screens=["home","quiz","results","review"];
function esc(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[c]))}
function show(id){screens.forEach(s=>$(s).classList.toggle("hidden",s!==id));window.scrollTo({top:0,behavior:"smooth"})}
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function getP(){try{return JSON.parse(localStorage.getItem("typeBProgress"))||{attempted:0,correct:0,missed:[]}}catch{return{attempted:0,correct:0,missed:[]}}}
function saveP(p){localStorage.setItem("typeBProgress",JSON.stringify(p));stats()}function stats(){const p=getP();$("attemptedStat").textContent=p.attempted;$("accuracyStat").textContent=p.attempted?Math.round(p.correct/p.attempted*100)+"%":"—";$("missedStat").textContent=p.missed.length}
function setup(){const cs=[...new Set(QUESTIONS.map(q=>q.chapter).filter(Boolean))].sort((a,b)=>a-b);$("chapter").innerHTML=cs.map(c=>`<option value="${c}">Chapter ${c}</option>`).join("")}
function start(){let pool=[...QUESTIONS],mode=$("mode").value;if(mode==="chapter")pool=pool.filter(q=>String(q.chapter)===$("chapter").value);if(mode==="missed"){const m=new Set(getP().missed);pool=pool.filter(q=>m.has(q.id));if(!pool.length){alert("There are no saved missed questions yet.");return}}pool=shuffle(pool);const r=$("count").value,n=r==="all"?pool.length:Math.min(Number(r),pool.length);state.quiz=pool.slice(0,n);state.index=0;state.correct=0;state.answers=[];show("quiz");render()}
function render(){state.answered=false;const q=state.quiz[state.index];$("quizMeta").textContent=`Question ${state.index+1} of ${state.quiz.length} • ${q.id} • Chapter ${q.chapter??"—"} • ${q.difficulty}`;$("progressBar").style.width=`${state.index/state.quiz.length*100}%`;$("questionText").textContent=q.question;$("feedback").className="feedback hidden";$("nextBtn").classList.add("hidden");$("answers").innerHTML="";Object.entries(q.answers).forEach(([l,t])=>{const b=document.createElement("button");b.className="answer";b.innerHTML=`<strong>${l}.</strong> ${esc(t)}`;b.onclick=()=>answer(l,b);$("answers").appendChild(b)})}
function answer(letter,clicked){if(state.answered)return;state.answered=true;const q=state.quiz[state.index],ok=letter===q.correctAnswer;if(ok)state.correct++;[...document.querySelectorAll(".answer")].forEach((b,i)=>{const l=Object.keys(q.answers)[i];b.disabled=true;if(l===q.correctAnswer)b.classList.add("correct");if(b===clicked&&!ok)b.classList.add("wrong")});const f=$("feedback");f.className="feedback "+(ok?"correct":"wrong");f.innerHTML=`<strong>${ok?"Correct":"Incorrect — correct answer: "+q.correctAnswer}</strong><br>${esc(q.explanation)}`;state.answers.push({id:q.id,isCorrect:ok});const p=getP();p.attempted++;if(ok)p.correct++;const m=new Set(p.missed);ok?m.delete(q.id):m.add(q.id);p.missed=[...m];saveP(p);$("nextBtn").textContent=state.index===state.quiz.length-1?"See Results":"Next Question";$("nextBtn").classList.remove("hidden")}
function next(){if(state.index<state.quiz.length-1){state.index++;render()}else finish()}function finish(){const t=state.quiz.length;$("scoreStat").textContent=Math.round(state.correct/t*100)+"%";$("correctStat").textContent=state.correct;$("wrongStat").textContent=t-state.correct;show("results")}
function review(items,title){$("reviewTitle").textContent=title;$("reviewList").innerHTML=items.length?items.map(q=>`<div class="review-item"><div><span class="pill">${q.id}</span><span class="pill">Chapter ${q.chapter??"—"}</span><span class="pill">${esc(q.difficulty)}</span></div><p><strong>${esc(q.question)}</strong></p><p><strong>Correct answer: ${q.correctAnswer}.</strong> ${esc(q.answers[q.correctAnswer])}</p><p>${esc(q.explanation)}</p></div>`).join(""):"<p>No questions to review.</p>";show("review")}
$("mode").onchange=()=>$("chapterWrap").classList.toggle("hidden",$("mode").value!=="chapter");$("startBtn").onclick=start;$("nextBtn").onclick=next;$("quitBtn").onclick=()=>{if(confirm("Quit this quiz?"))show("home")};$("homeBtn").onclick=()=>show("home");$("reviewHomeBtn").onclick=()=>show("home");
$("viewMissedBtn").onclick=()=>{const m=new Set(getP().missed);review(QUESTIONS.filter(q=>m.has(q.id)),"Missed Questions")};$("reviewQuizBtn").onclick=()=>{const m=new Set(state.answers.filter(a=>!a.isCorrect).map(a=>a.id));review(state.quiz.filter(q=>m.has(q.id)),"Review This Quiz")};
$("resetBtn").onclick=()=>{if(confirm("Erase all saved progress on this device?")){localStorage.removeItem("typeBProgress");stats()}};setup();stats();
</script></body></html>
