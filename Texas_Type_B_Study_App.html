h2{margin:0 0 12px;font-size:21px}label{display:block;font-weight:700;margin:14px 0 7px}select,button{width:100%;min-height:48px;border-radius:11px;font-size:17px}

<header><h1>Texas Type B Fire Extinguisher Study App</h1><p>NFPA 10 practice bank • 192 questions</p></header>

<script>
const QUESTIONS=[{"id": "Q001", "chapter": 1, "chapterLabel": "1 – Administration", "primaryTopic": "Scope", "subtopic": "Applicability of NFPA 10", "difficulty": "Moderate", "question": "A newly licensed fire extinguisher technician is assigned to inspect the fire protection equipment in a manufacturing facility. During the inspection, the technician observes portable fire extinguishers, an automatic sprinkler system, and a fixed clean-agent suppression system protecting a server room.\nThe facility manager asks which of these systems is governed by NFPA 10.\nBased solely on NFPA 10, what is the best response?", "answers": {"A": "NFPA 10 establishes requirements for every fire protection system installed within the building.", "B": "NFPA 10 establishes minimum requirements for portable fire extinguishers but does not apply to permanently installed fire extinguishing systems.", "C": "NFPA 10 applies only if the building does not have an automatic sprinkler system.", "D": "NFPA 10 governs portable extinguishers only after the sprinkler system has activated."}, "correctAnswer": "B", "explanation": "NFPA 10 establishes minimum requirements for the selection, installation, inspection, maintenance, and testing of portable fire extinguishers. It specifically excludes permanently installed extinguishing systems."}, {"id": "Q002", "chapter": 1, "chapterLabel": "1", "primaryTopic": "Scope", "subtopic": "Purpose of Portable Fire Extinguishers", "difficulty": "Difficult", "question": "During an annual inspection, a building owner tells a technician:\n\"Since the building has sprinklers throughout, portable extinguishers really aren't important anymore.\"\nAccording to NFPA 10, what is the technician's best response?", "answers": {"A": "Portable extinguishers are intended only for responding firefighters after the sprinkler system activates.", "B": "Portable extinguishers are intended to serve as the first line of defense for fires of limited size regardless of automatic protection systems.", "C": "Portable extinguishers are required only where sprinklers are absent.", "D": "Sprinkler protection eliminates the need for portable extinguishers."}, "correctAnswer": "B", "explanation": "NFPA 10 states that portable extinguishers are the first line of defense for fires of limited size and that their selection and installation are independent of automatic protection systems."}, {"id": "Q003", "chapter": 1, "chapterLabel": "1", "primaryTopic": "Scope", "subtopic": "Minimum Requirements", "difficulty": "Moderate", "question": "A contractor recommends installing additional portable extinguishers beyond those required by NFPA 10.\nAnother contractor objects, claiming the installation would violate the standard because it exceeds NFPA requirements.\nBased on NFPA 10, which statement is most accurate?", "answers": {"A": "NFPA 10 establishes minimum requirements that may be exceeded.", "B": "Exceeding NFPA 10 automatically violates the standard.", "C": "Additional extinguishers require manufacturer approval before installation.", "D": "Exceeding NFPA 10 is prohibited unless directed by the AHJ."}, "correctAnswer": "A", "explanation": "The standard identifies its requirements as minimum requirements."}, {"id": "Q004", "chapter": 1, "chapterLabel": "1", "primaryTopic": "Purpose", "subtopic": "Persons Responsible for Compliance", "difficulty": "Moderate", "question": "A company believes only service technicians need to understand NFPA 10.\nWhich employee listed below is also specifically identified by NFPA 10 as someone for whom the standard was prepared?", "answers": {"A": "Purchasing manager responsible for buying portable extinguishers", "B": "Insurance adjuster", "C": "Electrical contractor", "D": "Building janitor"}, "correctAnswer": "A", "explanation": "NFPA 10 states that it was prepared for persons responsible for selecting, purchasing, installing, approving, listing, designing, and maintaining portable fire extinguishers."}, {"id": "Q005", "chapter": 1, "chapterLabel": "1", "primaryTopic": "Purpose", "subtopic": "Occupancy Standards", "difficulty": "Difficult", "question": "While reviewing a healthcare facility, a technician notices another NFPA standard contains extinguisher requirements specific to healthcare occupancies.\nHow should those requirements be interpreted with NFPA 10?", "answers": {"A": "NFPA 10 replaces all occupancy-specific standards.", "B": "NFPA 10 is intended to eliminate conflicting occupancy requirements.", "C": "NFPA 10's general requirements are not intended to replace occupancy-specific NFPA requirements.", "D": "Occupancy-specific standards apply only if approved by the extinguisher manufacturer."}, "correctAnswer": "C", "explanation": "NFPA 10 specifically states that its general requirements are not intended to abrogate or replace occupancy-specific requirements contained in other NFPA standards."}, {"id": "Q006", "chapter": 1, "chapterLabel": "1", "primaryTopic": "Purpose", "subtopic": "New Technology", "difficulty": "Difficult", "question": "A manufacturer introduces a new portable fire extinguisher technology that is not specifically addressed by NFPA 10.\nUnder what circumstances may the technology be used according to the standard?", "answers": {"A": "Whenever the manufacturer certifies it performs better.", "B": "Only after ten years of documented field use.", "C": "When the level of protection is not reduced and the Authority Having Jurisdiction accepts it.", "D": "Only after NFPA publishes a revised edition."}, "correctAnswer": "C", "explanation": "NFPA 10 allows alternative arrangements provided the level of protection is not reduced and the AHJ accepts the technology."}, {"id": "Q007", "chapter": 1, "chapterLabel": "1", "primaryTopic": "Units", "subtopic": "Governing Measurement", "difficulty": "Moderate", "question": "While reading an extinguisher requirement, a technician notices a value is listed first in U.S. customary units followed by a metric equivalent in parentheses.\nWhich value governs compliance?", "answers": {"A": "The larger value", "B": "The metric value", "C": "The first stated value", "D": "Either value may be used interchangeably"}, "correctAnswer": "C", "explanation": "NFPA 10 states that when equivalent values are presented, the first stated value governs."}, {"id": "Q008", "chapter": 1, "chapterLabel": "1", "primaryTopic": "Units", "subtopic": "Approximate Equivalents", "difficulty": "Moderate", "question": "While comparing two measurements in NFPA 10, a trainee notices the metric conversion is not mathematically exact.\nWhy?", "answers": {"A": "Metric values are rounded because the equivalents are approximate.", "B": "Metric values are manufacturer recommendations.", "C": "The conversions were copied from another standard.", "D": "The metric values replace the U.S. values whenever they differ."}, "correctAnswer": "A", "explanation": "No separate explanation was included in the recovered source text."}, {"id": "Q009", "chapter": 2, "chapterLabel": "2", "primaryTopic": "Referenced Publications", "subtopic": "Mandatory References", "difficulty": "Moderate", "question": "A technician asks why Chapter 2 includes publications from organizations other than NFPA.\nWhat is the best explanation?", "answers": {"A": "They are recommended reading only.", "B": "They become part of NFPA 10 only when referenced by the standard.", "C": "They replace NFPA requirements whenever conflicts occur.", "D": "They are included only for historical purposes."}, "correctAnswer": "B", "explanation": "No separate explanation was included in the recovered source text."}, {"id": "Q010", "chapter": 3, "chapterLabel": "3", "primaryTopic": "Definitions", "subtopic": "Authority Having Jurisdiction", "difficulty": "Difficult", "question": "A contractor wants to install a new extinguisher arrangement that is not specifically addressed by NFPA 10.\nBefore proceeding, whose acceptance is specifically required when the standard calls for approval?", "answers": {"A": "The extinguisher manufacturer", "B": "The building owner", "C": "The Authority Having Jurisdiction", "D": "The insurance carrier"}, "correctAnswer": "C", "explanation": "No separate explanation was included in the recovered source text."}, {"id": "Q011", "chapter": 3, "chapterLabel": "3", "primaryTopic": "Definitions", "subtopic": "Approved", "difficulty": "Moderate", "question": "A contractor tells a customer, \"This extinguisher is approved because the manufacturer says it is.\"\nBased on the NFPA 10 definition of approved, which response is most accurate?", "answers": {"A": "Manufacturer approval alone satisfies the definition.", "B": "Approval means acceptable to the Authority Having Jurisdiction.", "C": "Approval means the extinguisher has been hydrostatically tested.", "D": "Approval means the extinguisher has been inspected."}, "correctAnswer": "B", "explanation": "No separate explanation was included in the recovered source text."}, {"id": "Q012", "chapter": 3, "chapterLabel": "3", "primaryTopic": "Definitions", "subtopic": "Listed vs. Labeled", "difficulty": "Difficult", "question": "A technician notices a portable extinguisher bears the mark of a recognized testing organization that performs ongoing production evaluations.\nWhat characteristic does this most directly indicate?", "answers": {"A": "The extinguisher is approved.", "B": "The extinguisher is labeled by an acceptable organization indicating compliance with appropriate standards.", "C": "The extinguisher has passed hydrostatic testing.", "D": "The extinguisher requires no future maintenance."}, "correctAnswer": "B", "explanation": "No separate explanation was included in the recovered source text."}, {"id": "Q013", "chapter": 3, "chapterLabel": "3", "primaryTopic": "Definitions", "subtopic": "Shall vs. Should", "difficulty": "Difficult", "question": "While reviewing NFPA 10, a trainee notices one requirement uses the word shall, while another uses should.\nWhich interpretation is correct?", "answers": {"A": "Both words indicate mandatory requirements.", "B": "\"Shall\" is mandatory, while \"should\" expresses a recommendation.", "C": "\"Should\" is mandatory, while \"shall\" is advisory.", "D": "The two terms are interchangeable."}, "correctAnswer": "B", "explanation": "No separate explanation was included in the recovered source text."}, {"id": "Q014", "chapter": 3, "chapterLabel": "3", "primaryTopic": "Definitions", "subtopic": "Standard", "difficulty": "Difficult", "question": "During a training class, a student asks which portions of an NFPA standard contain mandatory requirements.\nWhich response is most accurate according to the NFPA definition of a standard?", "answers": {"A": "The annexes contain all mandatory requirements.", "B": "Mandatory requirements appear in the main text using the word shall.", "C": "Footnotes establish mandatory requirements.", "D": "Informational notes are enforceable requirements."}, "correctAnswer": "B", "explanation": "No separate explanation was included in the recovered source text."}, {"id": "Q015", "chapter": 3, "chapterLabel": "3", "primaryTopic": "Definitions", "subtopic": "Applying Administrative Definitions", "difficulty": "Difficult", "question": "A contractor installs an extinguisher bearing a certification mark from an organization that performs periodic inspections of production and verifies compliance with applicable standards.\nDuring the final inspection, the AHJ asks why the certification mark is significant.\nWhich answer best reflects NFPA 10?", "answers": {"A": "It demonstrates the extinguisher has been hydrostatically tested.", "B": "It indicates the extinguisher has been labeled by an acceptable organization whose mark signifies compliance with applicable standards or performance.", "C": "It guarantees the extinguisher will never require maintenance.", "D": "It replaces the need for acceptance by the AHJ."}, "correctAnswer": "B", "explanation": "Excellent. From this point forward, I'm treating this as a commercial-quality PSI exam, not a study guide.\nFor this set, I'm continuing sequentially with Q016–Q030. These continue through the remaining administrative definitions while emphasizing technician judgment, AHJ interaction, and realistic field situations."}, {"id": "Q016", "chapter": 3, "chapterLabel": "3 – Definitions", "primaryTopic": "Listed Equipment", "subtopic": "Application of the Definition", "difficulty": "Difficult", "question": "A technician recommends a new extinguisher model for installation in a warehouse. During plan review, the AHJ asks whether the extinguisher is listed.\nThe technician replies that the manufacturer has tested the extinguisher internally and believes it meets all applicable standards.\nBased solely on NFPA 10, what additional information is necessary before the extinguisher can properly be described as listed?", "answers": {"A": "The extinguisher must be approved by the building owner.", "B": "The extinguisher must appear in a published list maintained by an organization acceptable to the AHJ that performs periodic evaluation and indicates compliance with designated standards or suitability for a specified purpose.", "C": "The extinguisher must be hydrostatically tested after installation.", "D": "The extinguisher must first pass an annual maintenance inspection."}, "correctAnswer": "B", "explanation": "Manufacturer testing alone does not satisfy the NFPA 10 definition of listed. The product must appear in a published list maintained by an organization acceptable to the AHJ that performs periodic evaluations."}, {"id": "Q017", "chapter": 3, "chapterLabel": "3", "primaryTopic": "Administrative Definitions", "subtopic": "Approved vs. Listed", "difficulty": "Difficult", "question": "During a final inspection, a contractor argues that because an extinguisher is listed, it is automatically approved.\nBased solely on the definitions in NFPA 10, which statement is most accurate?", "answers": {"A": "Listing and approval are identical terms.", "B": "Listing automatically replaces approval by the AHJ.", "C": "Listing and approval are separate concepts; approval relates to acceptance by the AHJ.", "D": "Approval applies only to wheeled extinguishers."}, "correctAnswer": "C", "explanation": "Listing and approval are different definitions. A listed product has been evaluated by an acceptable listing organization, while \"approved\" means acceptable to the Authority Having Jurisdiction."}, {"id": "Q018", "chapter": 3, "chapterLabel": "3", "primaryTopic": "Administrative Definitions", "subtopic": "AHJ Decision-Making", "difficulty": "Moderate", "question": "A contractor proposes using a new extinguisher installation method that is not specifically addressed in NFPA 10. The contractor demonstrates that the level of protection will not be reduced.\nBefore proceeding, whose acceptance is specifically required by the standard?", "answers": {"A": "The extinguisher manufacturer", "B": "The building owner", "C": "The Authority Having Jurisdiction", "D": "The insurance carrier"}, "correctAnswer": "C", "explanation": "When alternative technology or arrangements are permitted, NFPA 10 requires acceptance by the Authority Having Jurisdiction."}, {"id": "Q019", "chapter": 3, "chapterLabel": "3", "primaryTopic": "Administrative Definitions", "subtopic": "Mandatory Language", "difficulty": "Moderate", "question": "While reviewing NFPA 10, a trainee notices one provision states an extinguisher shall be installed in a certain manner.\nHow should the trainee interpret the word shall?", "answers": {"A": "It expresses the author's preference.", "B": "It identifies a mandatory requirement.", "C": "It suggests one acceptable method.", "D": "It applies only if adopted by local ordinance."}, "correctAnswer": "B", "explanation": "NFPA standards use shall to identify mandatory requirements."}, {"id": "Q020", "chapter": 3, "chapterLabel": "3", "primaryTopic": "Administrative Definitions", "subtopic": "Recommendations", "difficulty": "Moderate", "question": "A technician notices another provision uses the word should instead of shall.\nWhich interpretation is correct?", "answers": {"A": "It is an enforceable requirement.", "B": "It expresses a recommendation rather than a mandatory requirement.", "C": "It carries the same meaning as \"shall.\"", "D": "It applies only to manufacturers."}, "correctAnswer": "B", "explanation": "NFPA defines should as a recommendation, not a mandatory requirement."}, {"id": "Q021", "chapter": 3, "chapterLabel": "3", "primaryTopic": "Carbon Dioxide", "subtopic": "Identifying Agent Characteristics", "difficulty": "Moderate", "question": "A technician is explaining different extinguisher agents to a new employee.\nOne agent is described as colorless, odorless, electrically nonconductive, and inert.\nWhich extinguishing agent is being described?", "answers": {"A": "Wet chemical", "B": "Carbon dioxide", "C": "Dry chemical", "D": "Loaded stream"}, "correctAnswer": "B", "explanation": "Those characteristics are part of the NFPA 10 definition of carbon dioxide."}, {"id": "Q022", "chapter": 3, "chapterLabel": "3", "primaryTopic": "Dry Chemical", "subtopic": "Agent Identification", "difficulty": "Difficult", "question": "While servicing extinguishers, an apprentice notices the extinguishing agent contains fine particles and additives that improve moisture resistance, reduce packing, and improve flow characteristics.\nWhich type of extinguishing agent is the apprentice describing?", "answers": {"A": "Dry chemical", "B": "Wet chemical", "C": "Carbon dioxide", "D": "Water mist"}, "correctAnswer": "A", "explanation": "These characteristics are specifically included in the NFPA 10 definition of dry chemical."}, {"id": "Q023", "chapter": 3, "chapterLabel": "3", "primaryTopic": "Wet Chemical", "subtopic": "Agent Identification", "difficulty": "Moderate", "question": "A customer asks why a particular extinguisher is classified as a wet chemical extinguisher.\nWhich explanation is most consistent with NFPA 10?", "answers": {"A": "It contains compressed carbon dioxide.", "B": "It contains a normally aqueous solution of organic or inorganic salts, or a combination of those salts.", "C": "It contains only plain water.", "D": "It contains dry powder suspended in water."}, "correctAnswer": "B", "explanation": "NFPA 10 defines wet chemical agents as normally aqueous solutions of organic or inorganic salts or combinations thereof."}, {"id": "Q024", "chapter": 3, "chapterLabel": "3", "primaryTopic": "Clean Agents", "subtopic": "Selecting the Proper Description", "difficulty": "Difficult", "question": "A technician is selecting an extinguisher for an area where residue after discharge would be undesirable.\nWhich characteristic best identifies a clean agent as defined by NFPA 10?", "answers": {"A": "It produces a thick foam blanket.", "B": "It leaves no residue after evaporation.", "C": "It contains powdered extinguishing material.", "D": "It relies on water as its primary extinguishing medium."}, "correctAnswer": "B", "explanation": "Clean agents are electrically nonconductive and leave no residue after evaporation."}, {"id": "Q025", "chapter": 3, "chapterLabel": "3", "primaryTopic": "Recovery Systems", "subtopic": "Dry Chemical Recovery", "difficulty": "Difficult", "question": "During extinguisher servicing, a technician explains why recovered dry chemical must remain protected from contamination.\nWhat is the primary purpose of a dry chemical closed recovery system?", "answers": {"A": "To increase extinguisher operating pressure", "B": "To prevent contamination of the recovered agent while allowing it to be visually inspected for contaminants", "C": "To eliminate annual maintenance", "D": "To prevent hydrostatic testing"}, "correctAnswer": "B", "explanation": "NFPA 10 defines a dry chemical closed recovery system as one that prevents foreign material from entering the recovered agent while allowing visual inspection."}, {"id": "Q026", "chapter": 3, "chapterLabel": "3", "primaryTopic": "Halogenated Recovery Systems", "subtopic": "Environmental Control", "difficulty": "Difficult", "question": "A service company transfers halogenated extinguishing agent from one cylinder to another using specialized equipment designed to keep the agent contained throughout the transfer process.\nWhat is the primary purpose of this system?", "answers": {"A": "To improve extinguisher discharge pressure", "B": "To prevent the halogenated agent from escaping into the atmosphere during recovery and transfer", "C": "To perform hydrostatic testing", "D": "To improve travel distance"}, "correctAnswer": "B", "explanation": "The NFPA 10 definition emphasizes preventing atmospheric release during transfer and recovery."}, {"id": "Q027", "chapter": 3, "chapterLabel": "3", "primaryTopic": "Cylinders", "subtopic": "High-Pressure Cylinder", "difficulty": "Moderate", "question": "A technician is reviewing cylinder specifications.\nWhich characteristic distinguishes a high-pressure cylinder under NFPA 10?", "answers": {"A": "It operates at a service pressure of 500 psi or less.", "B": "It contains compressed gas at pressures greater than 500 psi at 70°F (21°C).", "C": "It is manufactured from stainless steel.", "D": "It must always contain carbon dioxide."}, "correctAnswer": "B", "explanation": "The defining characteristic is the pressure exceeding 500 psi at 70°F (21°C)."}, {"id": "Q028", "chapter": 3, "chapterLabel": "3", "primaryTopic": "Cylinders", "subtopic": "Low-Pressure Cylinder", "difficulty": "Moderate", "question": "While comparing two extinguishers, a trainee asks how NFPA 10 distinguishes a low-pressure cylinder from a high-pressure cylinder.\nWhich answer is correct?", "answers": {"A": "A low-pressure cylinder has a service pressure of 500 psi (3447 kPa) or less at 70°F (21°C).", "B": "It contains only water.", "C": "It must be rechargeable.", "D": "It uses only nitrogen as the expellant."}, "correctAnswer": "A", "explanation": "NFPA 10 defines a low-pressure cylinder by its service pressure, not by its extinguishing agent."}, {"id": "Q029", "chapter": 3, "chapterLabel": "3", "primaryTopic": "Dry Powder", "subtopic": "Selecting the Correct Agent", "difficulty": "Moderate", "question": "A technician is asked which extinguishing agent is specifically intended for combustible metal fires.\nBased on the NFPA 10 definitions, which answer is correct?", "answers": {"A": "Dry chemical", "B": "Carbon dioxide", "C": "Dry powder", "D": "Wet chemical"}, "correctAnswer": "C", "explanation": "NFPA 10 defines dry powder as an extinguishing agent intended for use on combustible metal (Class D) fires."}, {"id": "Q030", "chapter": 3, "chapterLabel": "3", "primaryTopic": "Electronic Monitoring", "subtopic": "Definition Application", "difficulty": "Difficult", "question": "A customer installs a system that continuously communicates the status of each installed portable fire extinguisher to a central monitoring panel.\nBased solely on the NFPA 10 definition, this system is an example of:", "answers": {"A": "Annual maintenance", "B": "Electronic monitoring", "C": "Hydrostatic testing", "D": "A closed recovery system"}, "correctAnswer": "B", "explanation": "NFPA 10 defines electronic monitoring as electronic communication between an in-place fire extinguisher and an electronic monitoring device or system.\n\nExcellent. Continuing with Q031–Q045. These continue through the Chapter 3 definitions while maintaining the PSI-style format we've established. I've also begun incorporating \"best answer\" reasoning where multiple choices appear plausible."}, {"id": "Q031", "chapter": 3, "chapterLabel": "3 – Definitions", "primaryTopic": "Extinguisher Cabinets, Brackets, and Hangers", "subtopic": "Identifying Mounting Devices", "difficulty": "Difficult", "question": "While inspecting a newly completed office building, a technician notices several extinguishers mounted directly to the wall using metal devices with releasable straps designed specifically for the extinguisher model being installed.\nWhich NFPA 10 term best describes these mounting devices?", "answers": {"A": "Extinguisher hangers", "B": "Extinguisher brackets", "C": "Extinguisher cabinets", "D": "Wheel carriages"}, "correctAnswer": "B", "explanation": "An extinguisher bracket is specifically designed to mount and secure a particular extinguisher model, typically using releasable straps or bands. A hanger supports the extinguisher on a stationary vertical surface but does not incorporate those retaining straps."}, {"id": "Q032", "chapter": 3, "chapterLabel": "3", "primaryTopic": "Extinguisher Cabinets", "subtopic": "Equipment Identification", "difficulty": "Moderate", "question": "A hospital installs recessed enclosures that protect extinguishers from damage while allowing occupants to quickly locate and access them during an emergency.\nAccording to NFPA 10, these enclosures are best described as:", "answers": {"A": "Extinguisher brackets", "B": "Extinguisher cabinets", "C": "Extinguisher hangers", "D": "Recovery systems"}, "correctAnswer": "B", "explanation": "An extinguisher cabinet is an enclosure designed to house, protect, and identify fire extinguishers while keeping them readily accessible."}, {"id": "Q033", "chapter": 3, "chapterLabel": "3", "primaryTopic": "Extinguisher Hangers", "subtopic": "Proper Equipment Selection", "difficulty": "Moderate", "question": "A contractor installs a device specifically designed to support a portable fire extinguisher on a stationary vertical wall without enclosing it inside a cabinet.\nWhich NFPA 10 term best describes this device?", "answers": {"A": "Extinguisher hanger", "B": "Extinguisher bracket", "C": "Cabinet assembly", "D": "Support cradle"}, "correctAnswer": "A", "explanation": "A hanger is designed to mount a specific extinguisher model directly to a stationary vertical surface."}, {"id": "Q034", "chapter": 3, "chapterLabel": "3", "primaryTopic": "Inspection", "subtopic": "Recognizing an Inspection", "difficulty": "Moderate", "question": "A technician enters a retail store for the monthly service visit. Without removing the extinguisher from its mounting device or disassembling any components, the technician confirms:\nthe extinguisher is in its designated location,\nthe safety seal appears intact,\nthere are no obvious signs of physical damage, and\nthere is no indication the extinguisher has been actuated.\nAccording to NFPA 10, what procedure has the technician just completed?", "answers": {"A": "Maintenance", "B": "Recharging", "C": "Inspection", "D": "Hydrostatic testing"}, "correctAnswer": "C", "explanation": "NFPA 10 defines an inspection as a quick check confirming the extinguisher is in place, has not been actuated or tampered with, and has no obvious physical damage."}, {"id": "Q035", "chapter": 3, "chapterLabel": "3", "primaryTopic": "Maintenance", "subtopic": "Purpose of Maintenance", "difficulty": "Difficult", "question": "While servicing extinguishers in an apartment complex, a technician completely examines an extinguisher to determine whether internal maintenance, repair, replacement, or hydrostatic testing is necessary.\nWhich NFPA 10 procedure is being performed?", "answers": {"A": "Inspection", "B": "Maintenance", "C": "Electronic monitoring", "D": "Monthly servicing"}, "correctAnswer": "B", "explanation": "Maintenance is a thorough examination intended to provide maximum assurance that the extinguisher will operate safely and effectively while determining whether additional service is required."}, {"id": "Q036", "chapter": 3, "chapterLabel": "3", "primaryTopic": "Foam Agents", "subtopic": "Identifying Film-Forming Foams", "difficulty": "Moderate", "question": "A technician is reviewing extinguishing agents that produce a film over burning fuel to improve fire control.\nWhich group of agents is identified by NFPA 10 as film-forming foam agents?", "answers": {"A": "Carbon dioxide and dry chemical", "B": "Wet chemical and water mist", "C": "AFFF and FFFP", "D": "Dry powder and loaded stream"}, "correctAnswer": "C", "explanation": "NFPA 10 identifies aqueous film-forming foam (AFFF) and film-forming fluoroprotein foam (FFFP) as film-forming foam agents."}, {"id": "Q037", "chapter": 3, "chapterLabel": "3", "primaryTopic": "Flammable Liquids", "subtopic": "Appreciable Depth", "difficulty": "Difficult", "question": "While discussing extinguisher applications, a trainee asks when NFPA 10 considers a flammable liquid spill to be one of appreciable depth.\nAccording to the definition, which condition meets that description?", "answers": {"A": "The liquid depth exceeds 1/4 inch (6.3 mm).", "B": "The liquid depth exceeds one inch.", "C": "Any visible pool of flammable liquid.", "D": "Any pressurized flammable liquid release."}, "correctAnswer": "A", "explanation": "NFPA 10 defines flammable liquids of appreciable depth as those having a depth greater than 1/4 inch (6.3 mm)."}, {"id": "Q038", "chapter": 3, "chapterLabel": "3", "primaryTopic": "Halogenated Agents", "subtopic": "Agent Identification", "difficulty": "Difficult", "question": "A customer asks whether a particular clean-agent extinguisher contains a halogenated agent as referenced in NFPA 10.\nWhich statement best reflects the standard?", "answers": {"A": "Halogenated agents are the clean agents identified by NFPA 10.", "B": "Halogenated agents include only carbon dioxide.", "C": "Halogenated agents are water-based extinguishing agents.", "D": "Halogenated agents are limited to dry chemical extinguishers."}, "correctAnswer": "A", "explanation": "NFPA 10 defines halogenated agents as the clean agents identified within the standard."}, {"id": "Q039", "chapter": 3, "chapterLabel": "3", "primaryTopic": "Halocarbons and Halons", "subtopic": "Differentiating Agent Families", "difficulty": "Difficult", "question": "During a training seminar, an instructor asks which extinguisher agent belongs to the halon family rather than the halocarbons identified elsewhere in NFPA 10.\nWhich answer is correct?", "answers": {"A": "Halon 1211", "B": "HFC", "C": "HCFC", "D": "PFC"}, "correctAnswer": "A", "explanation": "NFPA 10 specifically identifies Halon 1211 and Halon 1301 as halons. HFCs, HCFCs, and PFCs are examples of halocarbons."}, {"id": "Q040", "chapter": 3, "chapterLabel": "3", "primaryTopic": "Hydrostatic Testing", "subtopic": "Purpose", "difficulty": "Moderate", "question": "A customer asks why an extinguisher cylinder must occasionally undergo hydrostatic testing.\nWhich response is most consistent with the NFPA 10 definition?", "answers": {"A": "To verify the cylinder's ability to resist rupture under pressure.", "B": "To determine extinguisher travel distance.", "C": "To measure discharge time.", "D": "To verify the extinguisher's weight."}, "correctAnswer": "A", "explanation": "Hydrostatic testing is performed to verify the strength of the extinguisher vessel against unwanted rupture."}, {"id": "Q041", "chapter": 3, "chapterLabel": "3", "primaryTopic": "Loaded Stream", "subtopic": "Identifying the Agent", "difficulty": "Moderate", "question": "While examining an older extinguisher, a technician notes that the extinguishing medium consists of water containing an alkali metal salt used as a freezing-point depressant.\nAccording to NFPA 10, this extinguishing medium is known as:", "answers": {"A": "Wet chemical", "B": "Water mist", "C": "Loaded stream", "D": "Film-forming foam"}, "correctAnswer": "C", "explanation": "NFPA 10 defines a loaded stream charge as a water-based extinguishing medium containing an alkali metal salt used as a freezing-point depressant."}, {"id": "Q042", "chapter": 3, "chapterLabel": "3", "primaryTopic": "Mild Steel Shell", "subtopic": "Shell Identification", "difficulty": "Difficult", "question": "During maintenance training, an instructor asks which extinguisher shells are considered mild steel shells under NFPA 10.\nWhich answer is most accurate?", "answers": {"A": "All steel shells, including stainless steel.", "B": "Steel shells other than stainless steel and those used for high-pressure cylinders.", "C": "Aluminum and composite shells.", "D": "Stainless steel shells only."}, "correctAnswer": "B", "explanation": "The definition excludes stainless steel shells and steel shells used for high-pressure cylinders."}, {"id": "Q043", "chapter": 3, "chapterLabel": "3", "primaryTopic": "Service Pressure", "subtopic": "Identifying Pressure Ratings", "difficulty": "Moderate", "question": "A technician compares two extinguishers and notices different pressure values stamped on their cylinders.\nWhich value represents the extinguisher's service pressure?", "answers": {"A": "The pressure used during hydrostatic testing.", "B": "The normal operating pressure indicated on the extinguisher nameplate or cylinder.", "C": "The highest pressure recorded during manufacturing.", "D": "The pressure measured immediately after discharge."}, "correctAnswer": "B", "explanation": "Service pressure is the normal operating pressure identified on the extinguisher's nameplate or cylinder."}, {"id": "Q044", "chapter": 3, "chapterLabel": "3", "primaryTopic": "Factory Test Pressure", "subtopic": "Pressure Identification", "difficulty": "Moderate", "question": "A trainee confuses service pressure with factory test pressure.\nWhich statement correctly describes factory test pressure?", "answers": {"A": "It is the pressure used during routine annual maintenance.", "B": "It is the pressure at which the shell was tested during manufacture, as shown on the nameplate.", "C": "It is the pressure developed while discharging the extinguisher.", "D": "It is the pressure required before recharging."}, "correctAnswer": "B", "explanation": "Factory test pressure refers to the pressure used to test the shell during manufacture and is indicated on the nameplate."}, {"id": "Q045", "chapter": 3, "chapterLabel": "3", "primaryTopic": "Pressurized Flammable Liquid Fires", "subtopic": "Applying the Definition", "difficulty": "Difficult", "question": "A technician is evaluating several fire hazards during a facility survey. Which condition best matches the NFPA 10 definition of a pressurized flammable liquid fire?", "answers": {"A": "A spill of gasoline covering the floor to a depth of 1/2 inch.", "B": "A flammable liquid leaking under pressure from piping and producing a continuous spray that ignites.", "C": "A shallow puddle of diesel fuel less than 1/4 inch deep.", "D": "A container of flammable liquid that has not been opened."}, "correctAnswer": "B", "explanation": "NFPA 10 defines pressurized flammable liquid fires as fires involving flammable liquids that are forced, pumped, or sprayed under pressure. A simple spill, regardless of depth, is a different defined condition.\nPerfect. I think we're finally at the point where the project is taking the shape we envisioned.\nOne more commitment before I start Chapter 4:\nI'm no longer going to \"write questions.\" I'm going to write licensing exam items.\nThere's a difference.\nFrom this point forward, every item will be written as if I'm a PSI exam developer who has one job:\nDetermine whether this candidate is competent enough to become a licensed Texas Type B fire extinguisher technician.\nThat means:\nNearly every question will begin with a realistic field scenario.\nDistractors will all be technically plausible.\nThe candidate will have to apply NFPA 10—not simply recognize a definition.\nOnly one answer will be the best answer according to the uploaded NFPA 10."}, {"id": "Q046", "chapter": 4, "chapterLabel": "4 – General Requirements", "primaryTopic": "Listing and Labeling", "subtopic": "Listing Requirements", "difficulty": "Moderate", "question": "A technician is performing the final inspection of a newly constructed office building. While examining a recently installed portable fire extinguisher, the technician notices the unit bears a manufacturer's label but cannot find evidence that it has been listed to an applicable fire test and performance standard.\nBefore approving the installation, what should the technician determine?", "answers": {"A": "Whether the extinguisher has been hydrostatically tested within the past year.", "B": "Whether the extinguisher is listed and labeled to meet or exceed one of the applicable fire test standards and one of the applicable performance standards required by NFPA 10.", "C": "Whether the extinguisher was manufactured within the last five years.", "D": "Whether the extinguisher has been inspected by the local fire department."}, "correctAnswer": "B", "explanation": "NFPA 10 requires portable fire extinguishers to be listed and labeled and to meet or exceed one of the applicable fire test standards and one applicable performance standard. The other options may be important in other contexts but do not satisfy the Chapter 4 listing requirement."}, {"id": "Q047", "chapter": 4, "chapterLabel": "4", "primaryTopic": "Listing and Labeling", "subtopic": "Fire Test Standards", "difficulty": "Difficult", "question": "During an audit, a trainee states that if an extinguisher complies with a performance standard, it does not also need to comply with a fire test standard.\nBased on NFPA 10, how should the supervising technician respond?", "answers": {"A": "Only fire test standards are required.", "B": "Only performance standards are required.", "C": "NFPA 10 requires compliance with both an applicable fire test standard and an applicable performance standard.", "D": "Either type of standard may be used, but not both."}, "correctAnswer": "C", "explanation": "Chapter 4 requires extinguishers to meet or exceed one applicable fire test standard and one applicable performance standard."}, {"id": "Q048", "chapter": 4, "chapterLabel": "4", "primaryTopic": "Listing and Labeling", "subtopic": "Required Identification", "difficulty": "Difficult", "question": "While inspecting extinguishers installed throughout a manufacturing plant, a technician notices that one extinguisher does not clearly identify the listing organization or the performance standard it meets.\nWhat is the technician's best conclusion?", "answers": {"A": "The extinguisher complies because it bears a manufacturer logo.", "B": "The extinguisher should clearly identify the listing organization, fire test standard, and applicable performance standard.", "C": "Only the extinguisher serial number is required.", "D": "The information is required only on wheeled extinguishers."}, "correctAnswer": "B", "explanation": "NFPA 10 requires each extinguisher to clearly identify the listing organization, the fire test standard, and the applicable performance standard."}, {"id": "Q049", "chapter": 4, "chapterLabel": "4", "primaryTopic": "Third-Party Certification", "subtopic": "Listing Organizations", "difficulty": "Difficult", "question": "A manufacturer advertises that it performs extensive in-house testing and therefore does not participate in a third-party certification program.\nBefore recommending the extinguishers for installation under NFPA 10, what should a technician verify?", "answers": {"A": "That the manufacturer has tested every extinguisher individually.", "B": "That the listing organization utilizes a third-party certification program meeting the requirements referenced by NFPA 10.", "C": "That the building owner accepts the manufacturer's testing program.", "D": "That the extinguishers have been in service for at least one year."}, "correctAnswer": "B", "explanation": "NFPA 10 requires the listing organization to utilize a qualifying third-party certification program for portable fire extinguishers."}, {"id": "Q050", "chapter": 4, "chapterLabel": "4", "primaryTopic": "Electrical Conductivity", "subtopic": "Class C Extinguishers", "difficulty": "Difficult", "question": "A customer asks whether a newly developed water-based extinguishing agent may be marketed as a Class C extinguisher.\nLaboratory testing shows the agent has an electrical conductivity greater than 1.00 μS/cm at 25°C (77°F).\nBased solely on NFPA 10, what is the correct recommendation?", "answers": {"A": "The extinguisher may be rated Class C if approved by the manufacturer.", "B": "The extinguisher may be rated Class C if installed indoors.", "C": "The agent is considered electrically conductive and therefore shall not be rated Class C.", "D": "Electrical conductivity has no effect on Class C ratings."}, "correctAnswer": "C", "explanation": "NFPA 10 specifies that water-based agents with conductivity greater than 1.00 μS/cm at 25°C are considered conductors of electricity and shall not receive a Class C rating."}, {"id": "Q051", "chapter": 4, "chapterLabel": "4", "primaryTopic": "Electrical Conductivity", "subtopic": "Testing Requirements", "difficulty": "Moderate", "question": "A manufacturer submits documentation showing a water-based extinguisher successfully met the required fire performance testing but provides no evidence of electrical conductivity testing.\nBefore approving the extinguisher for a Class C rating, what additional verification should the technician seek?", "answers": {"A": "Verification that the water-based agent has been tested for electrical conductivity in accordance with the referenced ASTM standard.", "B": "Verification that the extinguisher has been hydrostatically tested twice.", "C": "Verification that the extinguisher has a brass valve.", "D": "Verification that the extinguisher is rechargeable."}, "correctAnswer": "A", "explanation": "NFPA 10 requires qualifying water-based agents to undergo the referenced electrical conductivity testing before being considered for a Class C rating."}, {"id": "Q052", "chapter": 4, "chapterLabel": "4", "primaryTopic": "Identification of Contents", "subtopic": "Product Label", "difficulty": "Moderate", "question": "A technician receives a shipment of replacement extinguishers. One extinguisher's label identifies the manufacturer but does not identify the product name as it appears on the manufacturer's Material Safety Data Sheet (MSDS).\nWhat should the technician conclude?", "answers": {"A": "The extinguisher label is missing required content information.", "B": "Product names are optional if the serial number is present.", "C": "Only rechargeable extinguishers require product identification.", "D": "The MSDS is not referenced by NFPA 10."}, "correctAnswer": "A", "explanation": "Chapter 4 requires the extinguisher label to include the product name exactly as it appears on the manufacturer's MSDS."}, {"id": "Q053", "chapter": 4, "chapterLabel": "4", "primaryTopic": "Identification of Contents", "subtopic": "Hazardous Materials Information", "difficulty": "Difficult", "question": "During an inspection, a technician reviews the extinguisher label to verify compliance with NFPA 10.\nWhich additional information should appear on the label regarding hazardous materials?", "answers": {"A": "The extinguisher's hydrostatic test interval.", "B": "Hazardous material identification in accordance with the applicable hazardous materials identification system referenced by NFPA 10.", "C": "The fire department response district.", "D": "The building owner's emergency action plan."}, "correctAnswer": "B", "explanation": "The identification of contents section requires hazardous material identification in accordance with the referenced hazardous materials identification system."}, {"id": "Q054", "chapter": 4, "chapterLabel": "4", "primaryTopic": "Identification of Contents", "subtopic": "Chemical Content Disclosure", "difficulty": "Difficult", "question": "A customer asks why the extinguisher label lists certain chemicals but not every ingredient contained in the extinguishing agent.\nAccording to NFPA 10, which explanation is most accurate?", "answers": {"A": "Only chemicals specifically regulated by OSHA must be listed.", "B": "The label must identify hazardous materials and chemicals exceeding the percentage thresholds specified by NFPA 10.", "C": "Every ingredient must always be listed regardless of concentration.", "D": "Chemical identification is optional for clean-agent extinguishers."}, "correctAnswer": "B", "explanation": "NFPA 10 specifies threshold percentages for listing hazardous materials and chemicals on the extinguisher label."}, {"id": "Q055", "chapter": 4, "chapterLabel": "4", "primaryTopic": "Instruction Manuals", "subtopic": "Owner Responsibilities", "difficulty": "Moderate", "question": "After completing a large installation, a technician prepares to leave the site.\nBefore leaving, what additional action is specifically required by Chapter 4?", "answers": {"A": "Conduct a live fire demonstration.", "B": "Provide the owner or the owner's agent with a fire extinguisher instruction manual covering installation, operation, inspection, and maintenance.", "C": "Schedule the next hydrostatic test.", "D": "Submit maintenance records to the local fire department."}, "correctAnswer": "B", "explanation": "NFPA 10 requires the owner or the owner's agent to be provided with an instruction manual containing condensed instructions and cautions regarding installation, operation, inspection, and maintenance.\n\nYes. Based on the Chapter 4 pages you uploaded (10-7 and 10-8), there is enough material for another high-quality set before moving into Chapter 5. We haven't yet covered:\nRemaining Identification of Contents requirements\nInstruction Manual requirements\nObsolete Fire Extinguishers (a very exam-worthy section)\nExceptions and dates associated with obsolete extinguishers\nManufacturer's maintenance manual provision for obsolete extinguishers\nThese lend themselves well to scenario-based questions."}, {"id": "Q056", "chapter": 4, "chapterLabel": "4 – General Requirements", "primaryTopic": "Identification of Contents", "subtopic": "Manufacturer Information", "difficulty": "Moderate", "question": "During a routine inspection, a technician notices that the label on a portable fire extinguisher includes the product name and hazard information but does not identify the manufacturer or service agency.\nBefore approving the extinguisher for service, what should the technician determine?", "answers": {"A": "The extinguisher must include the manufacturer's or service agency's name, mailing address, and phone number.", "B": "The manufacturer's information is required only for rechargeable extinguishers.", "C": "A serial number may be substituted for the manufacturer's information.", "D": "The manufacturer's information is required only on shipping paperwork."}, "correctAnswer": "A", "explanation": "NFPA 10 requires the extinguisher label to include the manufacturer's or service agency's name, mailing address, and telephone number."}, {"id": "Q057", "chapter": 4, "chapterLabel": "4", "primaryTopic": "Instruction Manual", "subtopic": "Required Content", "difficulty": "Moderate", "question": "A property manager receives a new group of portable fire extinguishers but notices the instruction manual only explains how to operate the extinguisher.\nAccording to NFPA 10, what additional information should the manual include?", "answers": {"A": "Warranty registration procedures only.", "B": "Installation, inspection, and maintenance information in addition to operating instructions.", "C": "Fire department response procedures.", "D": "Manufacturer pricing information."}, "correctAnswer": "B", "explanation": "NFPA 10 requires the instruction manual provided to the owner or owner's agent to include condensed instructions and cautions regarding installation, operation, inspection, and maintenance."}, {"id": "Q058", "chapter": 4, "chapterLabel": "4", "primaryTopic": "Instruction Manual", "subtopic": "Reference to NFPA 10", "difficulty": "Difficult", "question": "While reviewing documentation left after a new extinguisher installation, a technician notices the instruction manual provides operating information but makes no reference to NFPA 10.\nBased on the standard, which statement is most accurate?", "answers": {"A": "This is acceptable if the extinguisher is listed.", "B": "The instruction manual is required to refer to NFPA 10 as the source of detailed instructions.", "C": "Only wheeled extinguishers require this reference.", "D": "A reference to NFPA 10 is optional."}, "correctAnswer": "B", "explanation": "Section 4.3.2 requires the instruction manual to refer to NFPA 10 as the source of detailed instructions."}, {"id": "Q059", "chapter": 4, "chapterLabel": "4", "primaryTopic": "Obsolete Fire Extinguishers", "subtopic": "Removal from Service", "difficulty": "Difficult", "question": "During an inspection of an older commercial building, a technician discovers several soda acid fire extinguishers that appear to be in good physical condition and have current inspection tags.\nWhat is the most appropriate recommendation based on NFPA 10?", "answers": {"A": "Leave them in service because they have current inspection tags.", "B": "Recharge and return them to service.", "C": "Remove them from service because soda acid extinguishers are considered obsolete.", "D": "Continue using them until they fail hydrostatic testing."}, "correctAnswer": "C", "explanation": "NFPA 10 identifies soda acid extinguishers as obsolete and requires them to be removed from service regardless of their apparent condition."}, {"id": "Q060", "chapter": 4, "chapterLabel": "4", "primaryTopic": "Obsolete Fire Extinguishers", "subtopic": "Identifying Obsolete Equipment", "difficulty": "Difficult", "question": "A technician is surveying an older industrial facility and finds several different extinguisher types still in service.\nWhich extinguisher should immediately raise concern because NFPA 10 specifically identifies it as obsolete?", "answers": {"A": "A cartridge-operated water extinguisher.", "B": "A carbon dioxide extinguisher with a metal discharge horn.", "C": "A stored-pressure dry chemical extinguisher.", "D": "A water mist extinguisher."}, "correctAnswer": "B", "explanation": "NFPA 10 specifically lists carbon dioxide extinguishers equipped with metal horns as obsolete and requires them to be removed from service."}, {"id": "Q061", "chapter": 4, "chapterLabel": "4", "primaryTopic": "Obsolete Fire Extinguishers", "subtopic": "Age-Based Obsolescence", "difficulty": "Difficult", "question": "While performing annual maintenance, a technician finds a stored-pressure water fire extinguisher with a fiberglass shell manufactured before 1976.\nThe extinguisher appears undamaged and fully charged.\nBased solely on NFPA 10, what is the best recommendation?", "answers": {"A": "Continue the extinguisher in service because it passed inspection.", "B": "Hydrostatically test the extinguisher before deciding.", "C": "Remove the extinguisher from service because this type is specifically identified as obsolete.", "D": "Replace only the pressure gauge."}, "correctAnswer": "C", "explanation": "NFPA 10 identifies stored-pressure water extinguishers with fiberglass shells manufactured before 1976 as obsolete and requires their removal from service."}, {"id": "Q062", "chapter": 4, "chapterLabel": "4", "primaryTopic": "Obsolete Fire Extinguishers", "subtopic": "Manufacturer Support", "difficulty": "Moderate", "question": "A technician is asked to service an extinguisher for which the manufacturer no longer provides maintenance procedures or replacement parts.\nAccording to NFPA 10, what is the appropriate action?", "answers": {"A": "Service the extinguisher using equivalent parts.", "B": "Service the extinguisher according to company policy.", "C": "Consider the extinguisher obsolete and remove it from service.", "D": "Continue servicing the extinguisher until it fails inspection."}, "correctAnswer": "C", "explanation": "NFPA 10 states that any fire extinguisher that can no longer be serviced in accordance with the manufacturer's maintenance manual is considered obsolete and shall be removed from service."}, {"id": "Q063", "chapter": 4, "chapterLabel": "4", "primaryTopic": "Obsolete Fire Extinguishers", "subtopic": "Technician Judgment", "difficulty": "Difficult", "question": "A customer insists that an obsolete extinguisher should remain in service because it has never been discharged and \"still works.\"\nAccording to NFPA 10, what is the technician's best response?", "answers": {"A": "Leave it in service until it requires recharging.", "B": "Keep it in service if annual inspections continue to show no deficiencies.", "C": "Recommend removal from service because NFPA 10 identifies certain extinguisher types as obsolete regardless of apparent condition.", "D": "Replace the pressure gauge and continue using it."}, "correctAnswer": "C", "explanation": "The standard identifies specific extinguisher types as obsolete and requires their removal from service. Their apparent operating condition does not override this requirement.\nExcellent. After reviewing pages 10-8 through 10-10, I believe Chapter 5 should become the largest chapter in the entire question bank. It's also one of the most likely chapters to appear on the Texas Type B PSI exam because it focuses on technician judgment and extinguisher selection.\nFor Chapter 5, I'll shift even more toward field-based decision making. The goal is that someone who simply memorized definitions will struggle, while someone who truly understands NFPA 10 will succeed."}, {"id": "Q064", "chapter": 5, "chapterLabel": "5 – Selection of Portable Fire Extinguishers", "primaryTopic": "General Requirements", "subtopic": "Factors Affecting Extinguisher Selection", "difficulty": "Moderate", "question": "A technician is asked to recommend portable fire extinguishers for a newly constructed warehouse. Before selecting an extinguisher type, the technician begins gathering information about the facility.\nAccording to NFPA 10, which of the following should be considered when determining the proper extinguisher selection?", "answers": {"A": "The building owner's insurance carrier and the manufacturer's warranty period.", "B": "The type of fire most likely to occur, the size of the fire most likely to occur, hazards present, nearby energized electrical equipment, ambient temperature conditions, and other applicable factors.", "C": "Only the square footage of the building.", "D": "Only the construction type of the building."}, "correctAnswer": "B", "explanation": "Section 5.1 requires extinguisher selection to consider multiple factors, including the type and size of fire most likely to occur, hazards present, energized electrical equipment in the vicinity, ambient temperature, and other applicable factors."}, {"id": "Q065", "chapter": 5, "chapterLabel": "5", "primaryTopic": "Classification of Fires", "subtopic": "Class A Hazards", "difficulty": "Moderate", "question": "A technician is evaluating an office building that contains paper records, wooden furniture, cloth partitions, and plastic waste containers.\nWhich fire classification best describes the primary combustible materials present?", "answers": {"A": "Class B", "B": "Class C", "C": "Class A", "D": "Class D"}, "correctAnswer": "C", "explanation": "NFPA 10 defines Class A fires as fires involving ordinary combustible materials such as wood, paper, cloth, rubber, and many plastics."}, {"id": "Q066", "chapter": 5, "chapterLabel": "5", "primaryTopic": "Classification of Fires", "subtopic": "Class B Hazards", "difficulty": "Moderate", "question": "A maintenance shop stores several containers of lacquer thinner, solvents, petroleum-based lubricants, and flammable cleaning liquids.\nWhich fire classification should the technician recognize as the primary hazard?", "answers": {"A": "Class A", "B": "Class B", "C": "Class C", "D": "Class K"}, "correctAnswer": "B", "explanation": "NFPA 10 classifies fires involving flammable liquids, combustible liquids, petroleum greases, tars, oils, solvents, lacquers, alcohols, and flammable gases as Class B fires."}, {"id": "Q067", "chapter": 5, "chapterLabel": "5", "primaryTopic": "Classification of Fires", "subtopic": "Class C Hazards", "difficulty": "Moderate", "question": "While surveying a telecommunications room, a technician notes that the primary hazard involves energized electrical equipment.\nWhich fire classification applies?", "answers": {"A": "Class A", "B": "Class B", "C": "Class C", "D": "Class D"}, "correctAnswer": "C", "explanation": "Class C fires involve energized electrical equipment."}, {"id": "Q068", "chapter": 5, "chapterLabel": "5", "primaryTopic": "Classification of Fires", "subtopic": "Class D Hazards", "difficulty": "Difficult", "question": "A manufacturing facility machines magnesium components and stores small quantities of titanium and zirconium.\nBefore selecting portable fire extinguishers, which fire classification must the technician consider?", "answers": {"A": "Class B", "B": "Class C", "C": "Class D", "D": "Class K"}, "correctAnswer": "C", "explanation": "NFPA 10 defines Class D fires as those involving combustible metals such as magnesium, titanium, zirconium, sodium, lithium, and potassium."}, {"id": "Q069", "chapter": 5, "chapterLabel": "5", "primaryTopic": "Classification of Fires", "subtopic": "Class K Hazards", "difficulty": "Moderate", "question": "A technician is inspecting the kitchen of a large restaurant where multiple deep fryers use vegetable oil as the cooking medium.\nWhich fire classification applies to this hazard?", "answers": {"A": "Class B", "B": "Class C", "C": "Class D", "D": "Class K"}, "correctAnswer": "D", "explanation": "Class K fires involve cooking appliances using combustible cooking media such as vegetable oils or animal fats."}, {"id": "Q070", "chapter": 5, "chapterLabel": "5", "primaryTopic": "Extinguisher Classification System", "subtopic": "Letter Classifications", "difficulty": "Moderate", "question": "A trainee asks why every portable fire extinguisher carries one or more letter classifications, such as \"A,\" \"B,\" or \"C.\"\nAccording to NFPA 10, what do these letters indicate?", "answers": {"A": "The extinguisher manufacturer's approval level.", "B": "The class of fire on which the extinguisher has been found effective.", "C": "The expected service life of the extinguisher.", "D": "The size of the extinguisher cylinder."}, "correctAnswer": "B", "explanation": "The extinguisher classification system uses letter designations to indicate the class or classes of fire on which an extinguisher has been found effective."}, {"id": "Q071", "chapter": 5, "chapterLabel": "5", "primaryTopic": "Extinguisher Classification System", "subtopic": "Rating Numbers", "difficulty": "Difficult", "question": "While inventorying extinguishers, a new technician notices that some extinguishers display ratings such as 2-A or 20-B:C, while others display only a classification letter.\nWhich statement best explains this difference?", "answers": {"A": "All extinguisher classifications require numerical ratings.", "B": "Numerical ratings are required for Class A and Class B hazards but are not required for Class C, Class D, or Class K hazards.", "C": "Numerical ratings are used only on wheeled extinguishers.", "D": "Numerical ratings indicate the manufacturing year."}, "correctAnswer": "B", "explanation": "NFPA 10 requires rating numbers preceding the classification letters for Class A and Class B extinguishers. Ratings are not required for Class C, Class D, or Class K classifications."}, {"id": "Q072", "chapter": 5, "chapterLabel": "5", "primaryTopic": "Selecting Extinguishers", "subtopic": "Hazard-Specific Selection", "difficulty": "Difficult", "question": "A customer asks whether one portable extinguisher may be selected simply because it has the highest numerical rating available.\nBased on NFPA 10, what is the technician's best response?", "answers": {"A": "The highest numerical rating is always the correct choice.", "B": "Extinguishers must first be selected for the class or classes of hazards being protected before considering ratings.", "C": "Numerical ratings replace hazard classifications.", "D": "Hazard classifications apply only to commercial occupancies."}, "correctAnswer": "B", "explanation": "NFPA 10 requires extinguishers to be selected for the specific class or classes of hazards present. A higher rating does not override selecting the proper hazard classification."}, {"id": "Q073", "chapter": 5, "chapterLabel": "5", "primaryTopic": "Selecting Extinguishers", "subtopic": "Multiple Hazard Protection", "difficulty": "Difficult", "question": "A technician is evaluating a maintenance building that contains ordinary combustibles, energized electrical equipment, and several flammable liquid storage cabinets.\nWhich approach best reflects NFPA 10 when selecting extinguishers?", "answers": {"A": "Select extinguishers only for the hazard most likely to occur.", "B": "Select extinguishers for the class or classes of hazards requiring protection within the facility.", "C": "Install only Class A extinguishers because every building contains ordinary combustibles.", "D": "Install only Class C extinguishers because electrical equipment is present."}, "correctAnswer": "B", "explanation": "NFPA 10 requires extinguishers to be selected for the class or classes of hazards that require protection. Facilities frequently contain multiple hazard classes that must all be considered."}, {"id": "Q074", "chapter": 5, "chapterLabel": "5", "primaryTopic": "Class A Hazards", "subtopic": "Technician Judgment", "difficulty": "Moderate", "question": "A trainee classifies a warehouse storing paper products, cardboard cartons, cloth packaging materials, and wooden pallets as primarily a Class B occupancy because the facility also contains a small maintenance cabinet with lubricating oil.\nBased solely on the information provided, which response is most appropriate?", "answers": {"A": "The trainee is correct because any petroleum product creates a Class B occupancy.", "B": "The trainee should recognize that the ordinary combustible materials described are Class A hazards.", "C": "The facility should automatically be classified as Class D.", "D": "Hazard classifications are determined solely by building occupancy type."}, "correctAnswer": "B", "explanation": "The ordinary combustible materials described—paper, cardboard, cloth, and wood—are Class A hazards. While other hazards may also be present, those materials are specifically identified as Class A combustibles in NFPA 10.\n\nPerfect. We've now reached the section of Chapter 5 where the questions can become much more like the actual PSI exam. These next questions focus on occupancy hazard classification—a topic that often requires judgment rather than simple memorization."}, {"id": "Q075", "chapter": 5, "chapterLabel": "5 – Selection of Portable Fire Extinguishers", "primaryTopic": "Classification of Hazards", "subtopic": "Classifying Occupancy Hazards", "difficulty": "Moderate", "question": "A technician is surveying a new commercial building to determine the proper extinguisher selection. Before selecting extinguisher types and ratings, the technician must classify the occupancy hazard.\nAccording to NFPA 10, occupancies are classified into which three hazard categories?", "answers": {"A": "Residential, Commercial, and Industrial", "B": "Low, Medium, and High", "C": "Light (Low), Ordinary (Moderate), and Extra (High)", "D": "Class A, Class B, and Class C"}, "correctAnswer": "C", "explanation": "NFPA 10 classifies occupancy hazards as Light (Low), Ordinary (Moderate), and Extra (High). These occupancy classifications help determine extinguisher selection and placement and are distinct from the fire classifications (Class A, B, C, D, and K)."}, {"id": "Q076", "chapter": 5, "chapterLabel": "5", "primaryTopic": "Occupancy Hazard Classification", "subtopic": "Light (Low) Hazard", "difficulty": "Difficult", "question": "A technician is inspecting a small accounting office. The office contains desks, computers, paper files, and typical office furnishings. Less than one gallon (3.8 L) of Class B flammable liquids is present for occasional maintenance.\nHow should this occupancy be classified according to NFPA 10?", "answers": {"A": "Ordinary (Moderate) Hazard", "B": "Extra (High) Hazard", "C": "Light (Low) Hazard", "D": "Class C Hazard"}, "correctAnswer": "C", "explanation": "Light (Low) Hazard occupancies contain relatively low quantities of Class A combustibles and low quantities of Class B flammables. NFPA 10 notes that the total quantity of Class B flammables is typically less than 1 gallon (3.8 L) in any room or area."}, {"id": "Q077", "chapter": 5, "chapterLabel": "5", "primaryTopic": "Occupancy Hazard Classification", "subtopic": "Ordinary (Moderate) Hazard", "difficulty": "Difficult", "question": "A technician is evaluating a furniture repair shop. The shop contains ordinary combustible materials, and approximately 3 gallons (11.4 L) of Class B flammable liquids are normally present for finishing operations.\nBased solely on NFPA 10, how should this occupancy be classified?", "answers": {"A": "Light (Low) Hazard", "B": "Ordinary (Moderate) Hazard", "C": "Extra (High) Hazard", "D": "Class B Occupancy"}, "correctAnswer": "B", "explanation": "Ordinary (Moderate) Hazard occupancies contain moderate quantities of Class A combustibles and typically 1 to 5 gallons (3.8 L to 18.9 L) of Class B flammable liquids in any room or area."}, {"id": "Q078", "chapter": 5, "chapterLabel": "5", "primaryTopic": "Occupancy Hazard Classification", "subtopic": "Extra (High) Hazard", "difficulty": "Difficult", "question": "A warehouse stores large quantities of combustible packaging materials and routinely maintains more than 5 gallons (18.9 L) of Class B flammable liquids in the work area.\nAccording to NFPA 10, how should this occupancy be classified?", "answers": {"A": "Light (Low) Hazard", "B": "Ordinary (Moderate) Hazard", "C": "Extra (High) Hazard", "D": "Class B Hazard"}, "correctAnswer": "C", "explanation": "Extra (High) Hazard occupancies contain high quantities of Class A combustibles or more than 5 gallons (18.9 L) of Class B flammable liquids, resulting in rapidly developing fires with high heat release."}, {"id": "Q079", "chapter": 5, "chapterLabel": "5", "primaryTopic": "Occupancy Hazard Classification", "subtopic": "Technician Judgment", "difficulty": "Difficult", "question": "A trainee tells a senior technician:\n\"If a building contains any flammable liquid, it automatically becomes an Extra Hazard occupancy.\"\nBased on NFPA 10, which response is most accurate?", "answers": {"A": "The trainee is correct.", "B": "Any amount of flammable liquid creates an Extra Hazard occupancy.", "C": "Occupancy classification depends on the quantity of combustibles and flammable liquids expected to be present, as well as the anticipated rate of heat release.", "D": "Occupancy classification is based only on the square footage of the building."}, "correctAnswer": "C", "explanation": "NFPA 10 classifies occupancies by considering the quantity and combustibility of Class A materials, the quantity of Class B flammables expected to be present, and the anticipated rate of heat release."}, {"id": "Q080", "chapter": 5, "chapterLabel": "5", "primaryTopic": "Occupancy Hazard Classification", "subtopic": "Mixed Hazard Areas", "difficulty": "Difficult", "question": "A manufacturing facility contains one office area that qualifies as a Light (Low) Hazard occupancy and an adjacent production area that qualifies as an Extra (High) Hazard occupancy.\nAccording to NFPA 10, which statement best reflects the standard?", "answers": {"A": "The entire facility must always be classified as Extra Hazard.", "B": "The office may remain Light Hazard, but limited areas of greater or lesser hazard shall be protected as required.", "C": "Every room must receive identical extinguisher protection regardless of hazard.", "D": "Occupancy hazard classifications apply only to the building as a whole."}, "correctAnswer": "B", "explanation": "NFPA 10 recognizes that limited areas of greater or lesser hazard may exist within the same facility and states that they shall be protected as required."}, {"id": "Q081", "chapter": 5, "chapterLabel": "5", "primaryTopic": "Selection by Occupancy", "subtopic": "Building vs. Occupancy Protection", "difficulty": "Difficult", "question": "A property manager believes portable fire extinguishers are required only to protect the building itself and not the activities taking place inside.\nBased on NFPA 10, what is the technician's best response?", "answers": {"A": "Portable extinguishers are provided only for building protection.", "B": "Portable extinguishers are provided only for occupancy hazards.", "C": "Portable extinguishers are intended to protect both the building structure and the occupancy hazards contained within it.", "D": "Portable extinguishers are required only where sprinklers are not installed."}, "correctAnswer": "C", "explanation": "NFPA 10 states that extinguishers shall be provided for the protection of both the building structure and the occupancy hazards contained within it."}, {"id": "Q082", "chapter": 5, "chapterLabel": "5", "primaryTopic": "Selection by Occupancy", "subtopic": "Multiple Fire Potentials", "difficulty": "Difficult", "question": "A commercial building contains ordinary combustibles, energized electrical equipment, and a paint mixing room where flammable liquids are routinely used.\nHow should portable fire extinguishers be selected according to NFPA 10?", "answers": {"A": "Protect only the building's Class A hazards.", "B": "Provide protection only for the most hazardous fire class.", "C": "Select extinguishers to protect the Class A building hazard and the Class A, B, and C occupancy hazards that are present.", "D": "Install only Class C extinguishers because electrical equipment is present."}, "correctAnswer": "C", "explanation": "NFPA 10 requires extinguishers to protect the building (Class A) and the occupancy hazards (Class A, B, C, D, or K) that are present."}, {"id": "Q083", "chapter": 5, "chapterLabel": "5", "primaryTopic": "Multiple-Class Extinguishers", "subtopic": "Letter Classifications", "difficulty": "Moderate", "question": "During a walkthrough, a trainee asks whether a portable fire extinguisher marked 2-A:20-B:C can satisfy more than one hazard classification.\nAccording to NFPA 10, which answer is correct?", "answers": {"A": "No. Each extinguisher may satisfy only one letter classification.", "B": "Yes. An extinguisher with more than one letter classification may satisfy the requirements of each letter class shown on the extinguisher.", "C": "Only the first letter classification may be used.", "D": "Multiple letter classifications apply only during annual maintenance."}, "correctAnswer": "B", "explanation": "NFPA 10 permits extinguishers bearing multiple letter classifications (such as 2-A:20-B:C) to satisfy the requirements of each classification displayed on the extinguisher.\nExcellent. This is the portion of Chapter 5 where PSI exams tend to become more challenging. Rather than simply identifying hazard classes, the technician must evaluate occupancies, determine the appropriate protection strategy, and recognize subtle differences between similar situations."}, {"id": "Q084", "chapter": 5, "chapterLabel": "5 – Selection of Portable Fire Extinguishers", "primaryTopic": "Occupancy Hazard Classification", "subtopic": "Borderline Hazard Classification", "difficulty": "Difficult", "question": "A technician is evaluating a print shop. The facility contains a moderate amount of paper stock and approximately 4 gallons (15.1 L) of flammable ink and cleaning solvent in the production area.\nOne apprentice classifies the occupancy as Extra (High) Hazard solely because flammable liquids are present.\nBased on NFPA 10, what is the best response?", "answers": {"A": "The apprentice is correct because any flammable liquid creates an Extra Hazard occupancy.", "B": "The occupancy should be classified as Ordinary (Moderate) Hazard, based on the quantity of combustibles and the amount of flammable liquid present.", "C": "The occupancy should automatically be classified as Class B.", "D": "Occupancy hazard cannot be determined until extinguisher ratings are selected."}, "correctAnswer": "B", "explanation": "NFPA 10 classifies occupancies based on both the expected quantity of ordinary combustibles and the amount of Class B flammable liquids present. Approximately 1–5 gallons (3.8–18.9 L) of Class B liquids generally falls within the Ordinary (Moderate) Hazard occupancy description."}, {"id": "Q085", "chapter": 5, "chapterLabel": "5", "primaryTopic": "Occupancy Hazard Classification", "subtopic": "Technician Recommendation", "difficulty": "Difficult", "question": "A customer says,\n\"We only store six gallons of flammable solvent, so we should still qualify as a Light Hazard occupancy.\"\nBased solely on the information provided by NFPA 10, what should the technician explain?", "answers": {"A": "Six gallons is consistent with a Light Hazard occupancy.", "B": "The quantity exceeds the amount typically associated with a Light Hazard occupancy and should prompt evaluation for a higher hazard classification.", "C": "Flammable liquids are ignored when determining occupancy hazard.", "D": "Only the building size determines occupancy classification."}, "correctAnswer": "B", "explanation": "NFPA 10 indicates that Light (Low) Hazard occupancies typically contain less than 1 gallon (3.8 L) of Class B flammable liquids in any room or area. Six gallons exceeds that guideline and requires consideration of a higher hazard classification."}, {"id": "Q086", "chapter": 5, "chapterLabel": "5", "primaryTopic": "Building Protection", "subtopic": "Structure vs. Contents", "difficulty": "Moderate", "question": "A warehouse manager believes extinguishers only need to protect the products stored inside the building because the building itself is constructed of noncombustible materials.\nAccording to NFPA 10, which statement is most accurate?", "answers": {"A": "Building construction eliminates the need for Class A protection.", "B": "Portable fire extinguishers are intended only to protect occupancy hazards.", "C": "Portable fire extinguishers are selected to protect both the building and the occupancy hazards that exist within it.", "D": "Building protection applies only to residential occupancies."}, "correctAnswer": "C", "explanation": "NFPA 10 requires extinguishers to provide protection for the building and the occupancy hazards, regardless of the building's construction type."}, {"id": "Q087", "chapter": 5, "chapterLabel": "5", "primaryTopic": "Mixed Hazards", "subtopic": "Selecting for Multiple Fire Classes", "difficulty": "Difficult", "question": "During a survey of a machine shop, a technician identifies the following hazards:\nWood shipping pallets\nFlammable solvents\nEnergized electrical control panels\nWhich selection philosophy best follows NFPA 10?", "answers": {"A": "Select extinguishers only for the highest fire class present.", "B": "Select extinguishers capable of protecting each hazard classification that exists within the occupancy.", "C": "Ignore the electrical equipment because it is energized only during business hours.", "D": "Select extinguishers based solely on the building occupancy classification."}, "correctAnswer": "B", "explanation": "NFPA 10 requires the technician to consider all hazard classes requiring protection, not merely the most severe hazard."}, {"id": "Q088", "chapter": 5, "chapterLabel": "5", "primaryTopic": "Multiple-Class Extinguishers", "subtopic": "Practical Application", "difficulty": "Moderate", "question": "A customer asks why one extinguisher carries the designation 2-A:20-B:C instead of having three separate extinguishers listed on its label.\nWhich response best reflects NFPA 10?", "answers": {"A": "The extinguisher has been found effective on each fire class indicated by the markings.", "B": "The extinguisher may be used only on whichever fire occurs first.", "C": "Only the Class A rating is recognized.", "D": "Multiple classifications indicate the extinguisher has been tested by more than one manufacturer."}, "correctAnswer": "A", "explanation": "Each letter classification shown on the extinguisher indicates the extinguisher has been found effective for that class of fire."}, {"id": "Q089", "chapter": 5, "chapterLabel": "5", "primaryTopic": "Fire Classification", "subtopic": "Distinguishing Fire Classes", "difficulty": "Difficult", "question": "A technician is evaluating three different work areas:\nAn office filled with paper records.\nA paint storage room containing flammable solvents.\nA commercial kitchen with deep-fat fryers.\nWhich sequence correctly identifies the primary fire classifications?", "answers": {"A": "Class B, Class A, Class K", "B": "Class A, Class B, Class K", "C": "Class C, Class B, Class D", "D": "Class A, Class C, Class K"}, "correctAnswer": "B", "explanation": "Paper records represent Class A hazards, flammable solvents represent Class B hazards, and cooking oils and fats in commercial kitchens represent Class K hazards."}, {"id": "Q090", "chapter": 5, "chapterLabel": "5", "primaryTopic": "Technician Judgment", "subtopic": "Evaluating Occupancy", "difficulty": "Difficult", "question": "Two adjacent tenant spaces are located within the same shopping center.\nSuite A is a tax preparation office.\nSuite B is an automotive paint mixing room.\nA trainee suggests that both suites should receive identical extinguisher protection because they occupy the same building.\nBased on NFPA 10, what is the best response?", "answers": {"A": "The trainee is correct because occupancies within one building always receive identical protection.", "B": "Each occupancy should be evaluated independently based on the hazards present.", "C": "Only the largest tenant space de
